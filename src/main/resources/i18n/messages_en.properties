privacy_title=Privacy Policy
privacy_vietjet=Vietjet Air Privacy Policy
privacy_lastUpdated=Last updated on 14/14/2025
privacy_thankYou_1=Thank you for trusting and using the services of Vietjet Air through
privacy_thankYou_2=, the mobile application, the Vietjet Skyjoy membership program, the customer support center, or ticketing agents. We are committed to respecting and protecting your privacy, ensuring that all personal information collected is handled safely and transparently in accordance with legal regulations. This Privacy Policy explains how we collect, use, store, share, and protect your personal data, and outlines your rights regarding your personal data, including updates related to personal data integrated through the VNeID and Galaxy Pay (GPay) systems.
privacy_scope=This policy applies to all personal data that you agree to provide or share with us while using Vietjet Air's services. We recommend that you carefully read this policy to understand how we handle your personal data.

privacy_I=1. Interpretation and Definitions
privacy_I_1=1.1 Interpretation
privacy_I_1.1=Capitalized terms in this policy have the meanings as defined in Section 1.2 below.
privacy_I_2=1.2 Definitions
account=Account
privacy_I_2.1=The unique account created for you to access Vietjet Air services, including website, mobile applications, or other platforms.
partner=Partner
privacy_I_2.2=An organization that provides services or an affiliated company with Vietjet Air for the purpose of providing Services to you.
app=Application
privacy_I_2.3=The Vietjet Air mobile application provided by Vietjet Aviation Joint Stock Company.
privacy_company=Company
privacy_I_2.4=Vietjet Aviation Joint Stock Company, headquartered at 302/3 Kim Ma Street, Ngoc Khanh Ward, Ba Dinh District, Hanoi, Vietnam (hereinafter referred to as “Vietjet Air”, “We”, or “Company”).
privacy_I_2.5=Small data files stored on your device (computer, phone, tablet) to record browsing history or online activity.
nation=Country
device=Device
or_app=or 'Application'
personal_data=Personal Data
service=Service
supplier=Service Provider
data_used=Usage Data
web_site=Website
customer=Customer
privacy_I_2.6=Any device capable of accessing Vietjet Air services, such as computers, mobile phones, or tablets.
privacy_I_2.7=Information in the form of symbols, letters, numbers, images, sounds, or similar in electronic environment associated with a specific person or helping identify a specific person. Personal data includes basic personal data and sensitive personal data.
privacy_I_2.8=Includes websites, mobile applications, Vietjet Skyjoy program, passenger transport services, customer support services, and other services provided by Vietjet Air or in cooperation with Partners, Service Providers to provide to Customers.
privacy_I_2.9=Individuals or organizations hired by Vietjet Air to process personal data, support service provision, or analyze how the Service is used.
privacy_I_2.10=Data collected automatically when you use the Service, for example: access time, IP address, or device information.
privacy_I_2.11=The official website of Vietjet Air at vietjetair.com.
privacy_I_2.12=The subject of Personal Data, organizations or legal representatives of organizations using the Service.

privacy_II=2. Collection and Use of Personal Data
privacy_II_1=2.1 Types of Personal Data Collected
privacy_II_1.desc=When you use the Services, we may collect the following types of personal data:
privacy_II_1.1=Identification Information
privacy_II_1.1_desc=Full name, date of birth, gender, nationality, photo of identity documents, ID card/passport number. This information helps accurately identify you or the organization you represent.
privacy_II_1.2=Biometric Information
privacy_II_1.2_desc=Portrait photo, selfie video, facial recognition data (if consented), fingerprints (if applicable), and data from the VNeID identity app (if shared).
privacy_II_1.3=Contact Information
privacy_II_1.3_desc=Email address, phone number, home address, or other information related to your special requests (e.g., medical assistance or special services).
privacy_II_1.4=Payment Information
privacy_II_1.4_desc=Credit/debit card details, including cardholder name, card number, expiration date, and security code (CVV).
privacy_II_1.5=Booking and Reservation Information
privacy_II_1.5_desc=Flight details, ticket prices, booking dates, itineraries, reservations, or additional services (such as baggage or meals).
privacy_II_1.6=Vietjet Skyjoy Program Information
privacy_II_1.6_desc=Membership card number, card tier, mileage balance, transaction history, offers, and related membership account information.
privacy_II_1.7=Automatically Collected Information
privacy_II_1.7_desc=Data collected when you use the website or app, including IP address, browser type, cookies, login code, search history, or other online interactions.
privacy_II_1.8=Information from Communications
privacy_II_1.8_desc=Communications between you and Vietjet Air, including emails, messages, calls, complaints, surveys, or newsletter unsubscribe requests.
privacy_II_1.9=Social Media Information
privacy_II_1.9_desc=If you register via a social media account, we may receive information such as your name, email, interests, friend list, or flight search history, depending on your privacy settings.
privacy_II_1.10=Third-party Platform Information
privacy_II_1.10_desc=Electronic identification data from VNeID (if consented), eKYC data from Galaxy Pay SDK for payment and authentication purposes.

privacy_II_2_title=2.2 Usage Data
privacy_II_2_desc=We automatically collect usage data when you interact with our Services, including:
privacy_II_2_1=IP address, browser type, and browser version.
privacy_II_2_2=Pages visited, access time, and time spent on pages.
privacy_II_2_3=Device identifiers, diagnostic data, or other information related to online activities.
privacy_II_2_4=Biometric data: Fingerprint/Face (when using VNeID or GPay, with consent).
privacy_II_3_title=2.3 Information Collected from the App
privacy_II_3_desc=When using the Vietjet Air App, with your permission, we may collect:

location_data = Location Data
access_photo_library = Access to Photo Library
access_ewallet_sdk = Access to E-Wallet (SDK)
privacy_II_3_1= To provide location-based services, such as identifying the nearest airport.
privacy_II_3_2=To allow you to update your profile picture or use image-related features.
privacy_II_3_3= Includes Internet access, camera (to scan QR codes), contacts (to identify SkyPay users), or biometrics (to enable fingerprint payments). You may enable/disable these permissions anytime via device settings.
privacy_II_4_title=2.4 Tracking Technologies and Cookies
privacy_II_4_desc=We use cookies and similar tracking technologies (such as web beacons) to:
privacy_II_4_1=Track your activity on our website and app.
privacy_II_4_2=Store information like language preferences, search history, or session login data.
privacy_II_4_3=Analyze user behavior to improve our services.
privacy_II_4_cookie_types=Cookies may include:
privacy_II_4_session=Session cookies (deleted after closing the browser).
privacy_II_4_persistent=Persistent cookies (stored on your device for an extended period). You may manage cookies via your browser settings or refer to our Cookie Policy for more details.

privacy_III_3_title=3. Purpose of Personal Data Collection
privacy_III_3_desc=Vietjet Air collects and processes your personal data to provide the best service, ensure safety, comply with the law, and enhance customer experience. The specific purposes are as follows:

privacy_III_3_1_title=3.1 Contract Execution and Service Provision
privacy_III_3_1_1=Ticket issuance and transportation: Use identification information (full name, passport/ID number, date of birth) and contact details to complete booking, ticket issuance, check-in, identity verification, auto-gate airport checks, flight schedule notifications, or provide related journey services.
privacy_III_3_1_2=Identity verification and fraud prevention: Integrate data from VNeID and Galaxy Pay for secure eKYC authentication. For online check-in, biometric data (such as portrait photos, facial recognition data) are used to verify passenger identity, reducing check-in time and improving accuracy.
privacy_III_3_1_3=Special services: Collect sensitive information (such as medical care requests, special meals) with customer consent to provide suitable services, e.g., support for passengers with medical needs or special diets.
privacy_III_3_1_4=User experience optimization: Analyze usage data to improve interface, content, and application performance.
privacy_III_3_1_5=Marketing and promotional notifications (with consent): Send marketing messages and offers tailored to usage behavior.
privacy_III_3_1_6=Legal compliance: Provide information to authorities when legally required.

privacy_III_3_2_title=3.2 Management of Vietjet Skyjoy Program
privacy_III_3_2_1=Membership information updates: Send notifications about new policies, offers, promotions, or program terms changes.
privacy_III_3_2_2=Booking and service management: Use membership account information to support ticket booking, issuance, mileage accumulation, or gift redemption.
privacy_III_3_2_3=Data analysis: Evaluate flight history and member preferences to offer appropriate fares, services, or promotions.
privacy_III_3_2_4=Customer support: Address member inquiries, complaints, or requests to improve service quality.

privacy_III_3_3_title=3.3 Support Payment via Galaxy Pay Gateway
privacy_III_3_3_1=Transaction authentication: Use personal information (full name, card number, identification data) to verify account holder identity, ensuring legal and secure transactions.
privacy_III_3_3_2=Fraud prevention: Store data according to EKYC procedures to detect and prevent fraud or impersonation.
privacy_III_3_3_3=Legal compliance: Provide payment information upon request from the State Bank of Vietnam or authorities for inspection, audit, or investigation.

privacy_III_3_4_title=3.4 Aviation Security and Safety Assurance
privacy_III_3_4_1=Passenger screening: Verify identity before boarding to ensure flight safety.
privacy_III_3_4_2=Restricted list management: Maintain lists of passengers denied transport to protect the community.
privacy_III_3_4_3=Information sharing with authorities: Provide personal data, booking or itinerary information to border control, customs, immigration, or security agencies to comply with laws and prevent illegal activities.

privacy_III_3_5_title=3.5 Fulfillment of Accounting and Financial Obligations
privacy_III_3_5_1=Record keeping: Collect and store transaction information for accounting, financial reporting, or auditing purposes.
privacy_III_3_5_2=Legal compliance: Meet tax, financial inspection, or other legal requirements.

privacy_III_3_6_title=3.6 Customer Care
privacy_III_3_6_1=Inquiry and complaint resolution: Use contact information to respond to questions, handle complaints, or support customer requests.
privacy_III_3_6_2=Service improvement: Analyze personal data and feedback to upgrade website, applications, service processes, or design suitable offers.
privacy_III_3_6_3=Surveys: Conduct surveys to understand customer needs and satisfaction, thereby improving service experience.
privacy_III_3_6_4=Quick support: Use identification and transaction history to provide personalized assistance for faster resolution.

privacy_III_3_7_title=3.7 Contacting Customers
privacy_III_3_7_1=Service notifications: Send flight information, schedule changes, or important updates related to your journey.
privacy_III_3_7_2=Frequent flyer program support: Contact to answer inquiries or provide information about Vietjet Skyjoy mileage or exclusive offers.

privacy_III_3_8_title=3.8 Direct Marketing (With Your Consent)
privacy_III_3_8_1=Promotional offers: Provide information about special deals, fares, ancillary services, or related aviation products via email, messages, or newsletters.
privacy_III_3_8_2=Personalized advertising: Analyze preferences and usage history to send offers matching your needs.
privacy_III_3_8_3=Marketing campaign management: Contact to notify about promotions or surveys to enhance customer experience.
privacy_III_3_8_4=Unsubscribe: You can opt-out of marketing communications anytime by clicking unsubscribe links in emails or contacting us directly.

privacy_III_3_final_note=We only use personal data for marketing purposes with your explicit consent. You have the right to withdraw this consent at any time without affecting other services.

privacy_IV_title=4. Storage and Transfer of Personal Data

privacy_IV_4_1_title=4.1 Personal Data Storage
privacy_IV_4_1_1=Your personal data is stored on Vietjet Air's internal systems throughout the service provision period, until the data collection purpose is fulfilled or as permitted by law.
privacy_IV_4_1_2=We will delete the data when it is no longer necessary, except in cases where retention is required for legal compliance or dispute resolution.
privacy_IV_4_1_3=Biometric data will only be retained for the necessary duration to serve online check-in and airport verification, unless otherwise regulated by law or requested by competent authorities. After that period, the data will be deleted or destroyed in accordance with Vietjet Air's internal security procedures.

privacy_IV_4_2_title=4.2 Personal Data Transfer
privacy_IV_4_2_1=Personal data may be processed at Vietjet Air offices or by partners and service providers in other countries where data protection laws may differ from those in Vietnam.
privacy_IV_4_2_2=We ensure all data transfers are performed securely, in compliance with this policy and applicable legal regulations.
privacy_IV_4_2_3=Vietjet Air is committed to reviewing the data protection policies of recipients to ensure they apply equivalent security standards.

privacy_IV_4_3_title=4.3 Sharing Personal Data with Partners
privacy_IV_4_3_1=Government entities/regulatory bodies: National Population Data Center, security authorities, customs, and immigration (when required).
privacy_IV_4_3_2=Technology partners: Galaxy Pay (integrated payment authentication SDK), eKYC service providers, ACV (automated gate management).
privacy_IV_4_3_3=Vietjet Group partners: To support membership programs, payment processing, and passenger service handling.

privacy_IV_4_3_note=All data recipients are bound by confidentiality agreements and may only use the data for purposes designated by Vietjet Air.

privacy_V_title=5. Your Rights Regarding Personal Data

privacy_V_intro=You have the following rights regarding your personal data:

privacy_V_1=Right of access: Request Vietjet Air to confirm data is being processed, and provide details about the type of data, processing purposes, and list of data recipients.
privacy_V_2=Right to rectification: Request corrections of inaccurate information or supplementation of missing information.
privacy_V_3=Right to erasure: Request the deletion of personal data when it is no longer necessary, processed unlawfully, or in accordance with legal regulations.
privacy_V_4=Right to restrict processing: Request to limit how data is processed without requiring complete deletion.
privacy_V_5=Right to data portability: Receive your personal data or request its transfer to another organization in a suitable format.
privacy_V_6=Right to object: Object to the use of personal data for marketing or unnecessary purposes.
privacy_V_7=Right to withdraw consent: Withdraw previously given consent for data processing. This does not affect the legality of data processed before withdrawal.
privacy_V_8=Right to complain: Submit a complaint to authorities if Vietjet Air violates data protection regulations.
privacy_V_9=Right to withdraw consent for data sharing: You may request to withdraw your consent for sharing personal data via the VNeID or GPay applications at any time.

privacy_V_note=Note: Some data may be retained if Vietjet Air has legal obligations or a lawful basis to do so.

privacy_VI_title=6. Disclosure of Personal Data

privacy_VI_1_title=6.1 Business Transactions
privacy_VI_1_1=In the event that Vietjet Air is involved in a merger, asset sale, or restructuring, personal data may be transferred. We will notify you in advance.

privacy_VI_2_title=6.2 Partners and Service Providers
privacy_VI_2_1=Personal data may be shared with contractors or partners (such as other airlines, payment processors, ground service providers) to complete transactions or deliver requested services.
privacy_VI_2_2=These partners are prohibited from using the data for any purposes other than those agreed with Vietjet Air.

privacy_VI_3_title=6.3 Law Enforcement Authorities
privacy_VI_3_1=Vietjet Air may disclose personal data when required by competent authorities, courts, or to comply with regulations related to security, customs, immigration, or anti-terrorism.
privacy_VI_3_2=Personal data may also be shared to prevent threats to safety, protect Vietjet Air’s rights, or investigate unlawful behavior.

privacy_VII_title=7. Personal Data Security

privacy_VII_intro=We apply technical, organizational, and physical measures to protect personal data from unauthorized access, loss, or damage:

privacy_VII_1=Encryption and Security: Sensitive data is encrypted and stored in password-protected systems with access limited to authorized personnel.
privacy_VII_2=Firewalls and Security Software: Use of firewalls, antivirus software, and intrusion detection systems to prevent cyberattacks.
privacy_VII_3=Internal Management: Employee training on data security, continuous monitoring, and strict internal security policies.
privacy_VII_4=Physical Security: Use of security locks, surveillance cameras, and access controls for areas storing personal data.

privacy_VII_note=Although we strive to ensure the highest level of protection, no transmission or storage method is completely secure. Vietjet Air is committed to promptly handling any security incidents that may occur.

privacy_VIII_title=8. Transparency and User Control
privacy_VIII_intro=The Vietjet application will clearly request permission to access the following:
privacy_VIII_1=Location, camera, device storage (if related to app functionality).
privacy_VIII_2=These access requests will be clearly communicated in accordance with Google and Apple standards.

privacy_IX_title=9. Children’s Privacy
privacy_IX_1=For children under 14 years old (South Korea) or under the minimum age defined by each EU member state (typically 13–16 years), Vietjet Air collects data only with parental or legal guardian consent.
privacy_IX_2=Parents or legal guardians may request to view, edit, or withdraw their consent at any time through official contact channels.

privacy_X_title=10. Links to Other Websites
privacy_X_content=Our website and application may contain links to third-party websites. We do not control or take responsibility for the privacy practices of these websites. You should carefully review their privacy policies before providing any information.

privacy_XI_title=11. Data Breach Handling
privacy_XI_intro=In the event of a personal data breach, Vietjet Air will:
privacy_XI_1=Notify affected users and relevant authorities as soon as possible in accordance with legal requirements.
privacy_XI_2=Provide details on the nature of the breach, potential consequences, remediation measures, and contact information for support.
privacy_XI_note=We may be exempt from notification if the data was encrypted, the breach poses low risk, or notification is infeasible. In such cases, we will use public channels to communicate the issue.

privacy_XII_title=12. Changes to the Privacy Policy
privacy_XII_content=We may update this policy to reflect changes in our data processing practices or legal requirements. Any changes will be announced via email or on our website before taking effect, along with the “Last Updated” date. Please review it periodically to stay informed.

privacy_XIII_title=13. Contact
privacy_XIII_intro=For any questions, requests, or complaints regarding this privacy policy, please contact:

privacy_XIII_office=Office: 8th Floor, C.T Plaza Building, 60A Truong Son Street, Ward 2, Tan Binh District, Ho Chi Minh City
