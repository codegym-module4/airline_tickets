title=Vietjet Air | Enjoy flying | Official website
policy_baggage_title=Baggage Policy
baggage_note_I=I/ Cabin Baggage Regulations:
baggage_note1=Carry-on baggage allowed onboard must meet the following conditions:
baggage_note1_1=1. Weight conditions:
baggage_note1_1.2=Each passenger (excluding infants under 2 years old) is allowed to carry 01 main carry-on baggage and/or 01 small personal item with a total weight not exceeding 07kg (subject to fare class and route).
baggage_note1_2=2. Size conditions:
baggage_note1_2.1=01 main carry-on item with maximum dimensions of 56cm x 36cm x 23cm.
baggage_note1_2.2=01 small personal item (one of the following):
baggage_note1_2.3=01 handbag or book, magazine, camera, baby food bag, duty-free shopping bag... not exceeding 30cm x 20cm x 10cm.
baggage_note1_2.4=01 coat bag with maximum unfolded size of 114cm x 60cm x 11cm.
baggage_note1_2.5=01 laptop bag with maximum size of 40cm x 30cm x 10cm.
baggage_note1_3=3. Carry-on baggage tag requirement:
baggage_note1_3.1=All carry-on baggage must be tagged with Vietjet’s carry-on baggage tag. Please contact Vietjet staff at the check-in counter to get your carry-on baggage tagged according to the airline's policy. Any baggage without this tag will not be allowed onboard.
baggage_note1_4=4. Liquid regulations for carry-on baggage:
baggage_note1_4.1=Depending on applicable laws and local regulations, liquids may be brought onboard if the following conditions are met:
baggage_note1_4.2=Liquids must be in containers with a maximum volume of 100ml;
baggage_note1_4.3=All such containers must fit comfortably in a resealable transparent plastic bag with a capacity of no more than 1 liter.
baggage_note1_4.4=This plastic bag may be required to be opened separately at the security checkpoint. Items may be confiscated if they do not meet these requirements.
baggage_note1_5=(*) Important notes:
baggage_note1_5.1=Carry-on baggage must comply with Vietjet’s regulations and must fit either under the seat in front of you or in the overhead bin. Items exceeding size or weight limits will not be allowed onboard.
baggage_note1_5.2=We reserve the right to re-check the size and weight of your carry-on baggage at the boarding gate. If it does not comply, you will be charged to check it in, or it may be refused for transport.
baggage_note1_5.3=Checked baggage fees are higher at the check-in and boarding areas. Fees will be charged in the local currency. Save more by purchasing baggage allowance in advance.
baggage_note1_5.4=Please refer to Vietjet’s baggage fees 
here=here
baggage_note_II=II/ Checked Baggage Regulations:
baggage_note_II_1=1. Standard Checked Baggage
baggage_note_II_1.1=The weight of standard checked baggage must not exceed 32kg per piece.
baggage_note_II_1.2=Dimensions must not exceed: 119cm x 119cm x 81cm.
baggage_note_II_1.3=A golf set with total dimensions (length + width + height) not exceeding 203cm is considered standard checked baggage.
baggage_note_II_1.4=Pre-register for checked baggage service via our website, ticket offices, agents, or customer service centers. Fees are higher at the airport.
baggage_note_II_2=2. Oversized Checked Baggage (Service effective from 03/01/2020)
baggage_note_II_2.1=Applicable only for Vietjet (VJ) flights.
baggage_note_II_2.2=Weight must not exceed 32kg per piece.
baggage_note_II_2.3=Dimensions exceed standard but not more than: 200cm x 119cm x 81cm.
baggage_note_II_2.4=Pre-purchased oversized baggage package includes standard fee and handling fee.
baggage_note_II_2.5=You can purchase this service via website, ticket office, agent, or service center.
note=(*) Note:
baggage_note_II_3=You may check baggage matching the package weight including 1 oversized item per passenger per leg.
baggage_note_II_3.1=You may check standard baggage if weight remains after checking one oversized item.
baggage_note_II_3.2=(Example: Buy 30kg oversized, use 25kg for oversized item + 5kg for standard baggage).
baggage_note_II_3.3=From the 2nd oversized item onwards, buy more service at the airport (max 2 oversized items per segment). Subject to actual conditions.
baggage_note_II_3.4=Standard package can be upgraded to oversized at least 3 hours before flight. Higher fee at the airport.
baggage_note_II_3.5=Please refer to Vietjet’s baggage fees.

baggage_note_II_4=3. General Conditions of Checked Baggage
baggage_note_II_4.1=- Items not accepted as Checked Baggage or transported in baggage: we reserve the right to refuse to carry baggage or items within baggage as follows:
baggage_note_II_4.2=a. Items not properly packed, unfit for safe carriage with ordinary care and handling.
baggage_note_II_4.3=b. Items that may pose a danger to the aircraft or persons or property on board, such as those defined in the ICAO and IATA Dangerous Goods Regulations and in our Conditions of Carriage and Contract Terms.
baggage_note_II_4.4=c. Items prohibited under applicable laws, regulations, or orders of any state or country of departure, arrival, or transit.
baggage_note_II_4.5=d. Items deemed by us to be unsuitable for transport due to their weight, shape, size, or nature.
baggage_note_II_4.6=e. Fragile or perishable items.
baggage_note_II_4.7=f. Living or dead animals.
baggage_note_II_4.8=g. Human or animal remains.
baggage_note_II_4.9=h. Fresh or frozen seafood or meats, which may be carried as hand baggage if approved by us as properly packed. Only styrofoam boxes and/or coolers containing dry/undamaged food items may be accepted after inspection by the authorities. If passengers refuse inspection, we have the right to deny baggage transport.
baggage_note_II_4.10=i. Firearms and ammunition.
baggage_note_II_4.11=j. Explosives, flammable or non-flammable gases (e.g., spray paint, butane, lighter gas), refrigerant gases (e.g., diving cylinders, liquid nitrogen), flammable liquids (e.g., paint, thinner, solvents), flammable solids (e.g., matches, lighters), organic peroxides (e.g., resins), poisons, infectious substances (e.g., viruses, bacteria), radioactive materials (e.g., radium), corrosives (e.g., acids, alkalis, mercury, thermometers), magnetic substances, oxidizing materials (e.g., bleach).
baggage_note_II_4.12=k. Weapons such as guns, swords, antique knives, and similar items, which may be accepted as checked baggage at our sole discretion for special reasons. These are strictly prohibited in the cabin.
baggage_note_II_4.13=Valuable and fragile items: Passengers are advised not to check in such items. If checked, passengers agree to assume all risk. These items include cash, jewelry, precious metals, silverware, electronics, computers, cameras, video equipment, negotiable papers, securities, valuable documents, passports, and identification papers.
baggage_note_II_4.14=Right to search: For safety and security, we may require you and your baggage to undergo screening by X-ray or other means. We may inspect your baggage in your absence if you are not available, to check for prohibited or unauthorized items. If you refuse inspection or screening, we may deny carriage without refund or further liability. We are not liable for injury or loss caused by inspection or screening unless due to our fault or negligence.
baggage_note_II_4.15=Checked baggage: Once baggage is handed over to us for checking, we will store it and issue a baggage tag for each piece. Checked baggage must have the passenger’s name or other personal identification securely attached. Checked baggage is carried on the same flight as the passenger unless safety, security, or operational reasons require otherwise. If transported on a later flight, we will deliver the baggage to you within a reasonable time, unless customs laws require your presence.
baggage_note_II_4.16=Checked baggage: A baggage fee is charged for checked baggage. Each passenger may purchase only one checked baggage package. Passengers can purchase standard baggage packages of 20kg, 30kg, 40kg, 50kg, 60kg, 70kg, 80kg, 90kg, or 100kg (depending on route), and oversized baggage packages of 20kg or 30kg. Passengers may upgrade their package to a larger one up to 3 hours before scheduled departure. Excess baggage will be charged per kg at the airport check-in counter. Please refer to our Fee Schedule for details. Baggage fees are non-refundable and non-transferable.
baggage_note_II_4.17=Baggage delivery: You must collect your baggage as soon as it is available at the destination. If not collected within a reasonable time and we store it, storage fees may apply. If unclaimed within 2 months, we may dispose of the baggage without further liability. Only the person with the baggage tag issued at check-in is entitled to claim the baggage. If the baggage tag is not presented, we may release the baggage only if the claimant proves entitlement and provides indemnity if requested. Acceptance of baggage without complaint upon delivery is prima facie evidence it was delivered in good condition and per the carriage contract.

baggage_note_III=III/ Liability for Checked Baggage Damage
baggage_note_III_1=We are not liable for any damage arising from the inherent defects, quality issues, or deficiencies of the Baggage. Similarly, we shall not be held responsible for reasonable wear and tear or damage such as scratches, dents, and broken wheels or handles resulting from the normal handling and transportation of Baggage by air.
baggage_note_III_2=We provide compensation for Baggage damage based on the general principle of actual loss, but not exceeding our liability limits. Passengers are responsible for proving the actual damage to their Baggage. General compensation policy for lost baggage: Compensation is based on the baggage weight. For domestic routes: VND 200,000 (two hundred thousand Vietnamese Dong) per kilogram; for international routes: USD 20 (twenty US dollars) per kilogram or its equivalent in other currencies.
baggage_note_III_3=Compensation for Partially Damaged Checked Baggage
baggage_note_III_4=(Calculated in VND)
baggage_note_III_4.1=Broken pull handle
baggage_note_III_4.2=Broken wheel
baggage_note_III_4.3=Broken zipper
baggage_note_III_4.4=Cracked or dented
baggage_note_III_4.5=Torn fabric
baggage_note_III_4.6=Dented
baggage_note_III_4.7=Broken bag bottom (wheel area)
baggage_note_III_5=The liability limit for compensation in case of loss, shortage, or damage to Checked Baggage and Cabin Baggage is 1,288 Special Drawing Rights (SDRs) per Passenger.

baggage_note_IV=IV/ Liability for Delayed Baggage:
baggage_note_IV_1=The policy on goodwill compensation for delayed baggage applies when passengers are unable to retrieve their checked baggage within 24 hours of the aircraft's arrival at the destination, and do not permanently reside in the same Province/City as the airport of arrival. The compensation amount is VND 180,000 per passenger for domestic routes, and VND 300,000 per passenger for international routes. The liability limit for damage caused by delayed baggage is 1,288 Special Drawing Rights (SDRs) per passenger.
baggage_note_IV_2=We are not liable for any damage to baggage caused by delay if we can prove that: (i) we and our agents took all reasonable measures to avoid the damage, or (ii) it was impossible for us or our agents to take such measures.

baggage_note_1= Baby strollers, wheelchairs, and mobility aids for passengers taking the flight will be transported free of charge.
baggage_note_2= Infants (under 2 years old) are not entitled to baggage allowance, although strollers and bassinets are transported free of charge.
baggage_note_3=For health and safety reasons, the carrier does not accept any baggage exceeding 32kg in weight or with dimensions exceeding 200cm x 119cm x 81cm.
baggage_note_4= Oversized baggage (such as sports equipment) may be transported in the cargo hold after paying the oversize baggage service fee as specified in the Fee Schedule. The liability for such transport will follow the same limits as checked baggage under the airline's Conditions of Carriage. Therefore, passengers are advised to purchase appropriate insurance for these items.
baggage_note_5=For large musical instruments, passengers may either register as oversized checked baggage or purchase an extra seat for in-cabin placement. The seat for the instrument is subject to maximum size limits of 165cm x 44cm x 66cm and a maximum weight of 75kg. However, the extra seat does not come with any baggage allowance.

