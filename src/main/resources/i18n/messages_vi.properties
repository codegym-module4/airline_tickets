policy_baggage_title=Quy định hành lý
baggage_note_I=I/ Quy định về Hành lý xách tay:
baggage_note1=Hành lý xách tay đúng quy định được phép mang lên tàu bay phải đáp ứng các điều kiện sau:
baggage_note1_1=1. Điều kiện về trọng lượng:
baggage_note1_1.2=Mỗi hành khách (ngoại trừ em bé dưới 2 tuổi) được phép mang 01 kiện hành lý xách tay chính và/hoặc 01 túi xách nhỏ với tổng trọng lượng hành lý xách tay không vượt quá 07kg (tùy theo điều kiện hạng vé và đường bay).&nbsp;
baggage_note1_2=2. Điều kiện về kích thước:
baggage_note1_2.1=01 kiện hành lý xách tay chính có kích thước tối đa 56cm x 36cm x 23cm.
baggage_note1_2.2=01 túi cá nhân nhỏ (gồm một trong những túi sau):
baggage_note1_2.3=01 túi xách phụ nữ hoặc sách, tạp chí, máy ảnh, túi đựng thức ăn cho em bé, túi mua hàng tại sân bay...có kích thước không quá 30cm x 20cm x 10cm.
baggage_note1_2.4=01 túi đựng áo khoác có kích thước tối đa khi mở ra không quá 114cm x 60cm x 11cm.
baggage_note1_2.5=01 túi đựng máy tính xách tay có khích thước tối đa là 40cm x 30cm x 10cm.
baggage_note1_3=3. Điều kiện về nhãn hành lý xách tay:
baggage_note1_3.1=Hành lý xách tay phải được dán nhãn hành lý xách tay của Vietjet. Quý Hành Khách vui lòng liên hệ nhân viên Vietjet để dán nhãn cho hành lý xách tay theo quy định của hãng tại quầy Check-in. Tất cả hành lý xách tay không dán “nhãn hành lý xách tay” sẽ bị từ chối mang lên tàu bay.
baggage_note1_4=4. Điều kiện về quy định chất lỏng hành lý xách tay
baggage_note1_4.1=Tùy thuộc vào luật áp dụng và quy định tại chỗ, hành khách được mang chất lỏng trong hành lý xách tay lên máy bay, nếu hành lý đó đáp ứng các điều kiện sau:
baggage_note1_4.2=Chất lỏng được đựng trong vật chứa với thể tích không quá 100ml;
baggage_note1_4.3=Tất cả các vật chứa chất lỏng có thể tích tối đa 100ml mỗi thứ có thể được dễ dàng tách riêng vào một túi bóng trong suốt có thể đóng kín có thể tích 1 lít.
baggage_note1_4.4=Túi nhựa có thể phải được mở riêng ra ở khu vực an ninh. Quý khách có thể sẽ bị đòi hỏi phải bỏ đi các chất lỏng nếu không đáp ứng các yêu cầu trên.
baggage_note1_5=(*) Lưu ý quan trọng:
baggage_note1_5.1=Hành lý xách tay mang lên máy bay phải đúng quy định về hành lý xách tay của Vietjet và phải đặt vừa vào dưới chỗ ngồi trước mặt quý khách hoặc ngăn hành lý trong khoang hành khách. Các kiện hành lý mà chúng tôi xác định là có trọng lượng hoặc kích thước vượt quá quy định cho phép sẽ không được phép mang lên tàu bay.
baggage_note1_5.2=Chúng tôi có quyền kiểm tra lại trọng lượng và kích thước hành lý xách tay của quý khách tại cửa khởi hành. Hành lý xách tay không đúng quy định, quý khách sẽ phải trả phí để ký gửi hành lý hoặc hành lý của quý khách sẽ bị từ chối chuyên chở.
baggage_note1_5.3=Phí gửi hành lý sẽ cao hơn ở khu vực làm thủ tục và ở cửa khởi hành. Phí sẽ được thu bằng đơn vị tiền tệ nước sở tại. Hãy đảm bảo mua trước hành lý để tiết kiệm hơn.
baggage_note1_5.4=Vui lòng tham khảo phí gửi hành lý của Vietjet 
here=tại đây
baggage_note_II=II/ Quy định về Hành lý ký gửi:
baggage_note_II_1=1. Hành lý ký gửi tiêu chuẩn
baggage_note_II_1.1=Trọng lượng Hành lý ký gửi tiêu chuẩn không quá 32kg/ 1 kiện
baggage_note_II_1.2=Kích thước không quá: 119cm x 119cm x 81cm.
baggage_note_II_1.3=Bộ dụng cụ chơi Golf với tổng kích thước (dài + rộng + cao) không vượt qua 203 cm sẽ được tính là Hành ký gửi tiêu chuẩn.
baggage_note_II_1.4=Quý khách đăng ký trả trước dịch vụ Hành lý ký gửi tại Website, Phòng vé, Đại lý và Trung Tâm phục vụ khách hàng của chúng tôi. Phí dịch vụ Hành lý ký gửi sẽ cao hơn khi mua tại sân bay.
baggage_note_II_2=2. Hành lý ký gửi quá khổ (Dịch vụ áp dụng từ ngày 03/01/2020)
baggage_note_II_2.1=Dịch vụ chỉ áp dụng trên chuyến bay Vietjet (VJ)
baggage_note_II_2.2=Trọng lượng Hành lý ký gửi quá khổ không quá 32 kg/ 1 kiện
baggage_note_II_2.3=Kích thước quá quy định của hành lý ký gửi tiêu chuẩn nhưng không quá : 200cm x 119cm x 81 cm
baggage_note_II_2.4=Gói Hành lý ký gửi quá khổ được mua trước đã gồm phí Hành lý ký gửi và phí dịch vụ xử lý Hành lý quá khổ.
baggage_note_II_2.5=Quý khách đăng ký mua trước Gói Hành lý quá khổ tại Website, Phòng vé, Đại lý và Trung Tâm phục vụ khách hàng của chúng tôi.
note=(*) Lưu ý:
baggage_note_II_3=Hành khách đặt mua trước gói Hành lý quá khổ được ký gửi hành lý tương ứng trọng lượng gói đã mua, trong đó bao gồm 1 kiện quá khổ/ khách/ chặng bay.
baggage_note_II_3.1=Quý khách vẫn có thể ký gửi thêm hành lý tiêu chuẩn trong trường hợp gói hành lý quá khổ đã mua còn dư trọng lượng sau khi ký gửi kiện hành lý quá khổ.
baggage_note_II_3.2=(Ví dụ: Quý khách đặt mua gói Hành lý quá khổ 30kg, trong đó Quý khách có thể gửi 1 kiện quá khổ 25kg + 1 gói hành lý tiêu chuẩn 5kg).
baggage_note_II_3.3=Từ kiện Hành lý quá khổ thứ 2 phát sinh, Quý khách sẽ phải mua bổ sung dịch vụ tại sân bay, và tuân theo quy định 2 kiện quá khổ/ khách/ chặng bay. Tuy nhiên việc phục vụ có thể được điều chỉnh cho phù hợp theo thực tế khai thác tại sân bay.
baggage_note_II_3.4=Hành khách đã mua gói Hành lý ký gửi tiêu chuẩn vẫn có thể thay đổi thành Hành lý quá khổ trước 3 tiếng so với giờ bay khởi hành dự kiến bằng cách liên hệ các kênh bán để yêu cầu. Phí dịch vụ Hành lý quá khổ sẽ cao hơn khi mua tại sân bay.
baggage_note_II_3.5=Vui lòng tham khảo phí gửi hành lý của Vietjet

baggage_note_II_4=3. Điều kiện chung của Hành lý ký gửi
baggage_note_II_4.1=- Các vật phẩm không được chấp nhận dưới dạng Hành lý ký gửi hoặc vận chuyển trong hành lý, chúng tôi có quyền từ chối vận chuyển hành lý hoặc vật phẩm trong hành lý như sau:
baggage_note_II_4.2=a. Các vật phẩm không được đóng gói đúng quy cách, không đủ điều kiện vận chuyển an toàn với sự chăm sóc và xử lý thông thường.
baggage_note_II_4.3=b. Các vật phẩm có thể gây nguy hại cho tàu bay hoặc người hoặc tài sản trên tàu bay, như các loại vật phẩm quy định trong các quy định về Hàng hóa Nguy hiểm của tổ chức hàng không thế giới (ICAO) và Hiệp hội vận tải hàng không thế giới (IATA) và trong Điều lệ vận chuyển và Các điều khoản hợp đồng của chúng tôi.
baggage_note_II_4.4=c. Các vật phẩm bị cấm theo quy định của luật áp dụng, quy định hoặc lệnh của bất kỳ bang hay quốc gia nào nơi bay đến, bay đi và bay qua.
baggage_note_II_4.5=d. Các vật phẩm theo nhận định của chúng tôi là không thích hợp cho việc vận chuyển do trọng lượng, hình dáng, kích thước hoặc tính chất của chúng.
baggage_note_II_4.6=e. Các vật phẩm dễ vỡ hoặc dễ hỏng.
baggage_note_II_4.7=f. Động vật sống hoặc chết.
baggage_note_II_4.8=g. Hài cốt hoặc động vật.
baggage_note_II_4.9=h. Hải sản tươi sống hoặc đông lạnh hoặc các loại thịt, với điều kiện các vật phẩm này có thể vận chuyển dưới dạng hành lý xách tay nếu chúng tôi chấp thuận rằng chúng đã được đóng gói đúng quy cách. Chỉ những thùng xốp và/hoặc thùng giữ lạnh chứa đựng thực phẩm khô/không bị hư hỏng có thể được phép làm thủ tục sau khi các cơ quan chức năng đã kiểm tra nội dung bên trong. Nếu Hành khách từ chối việc kiểm tra, thì chúng tôi có quyền từ chối vận chuyển Hành lý.
baggage_note_II_4.10=i. Súng và đạn dược.
baggage_note_II_4.11=j. Chất nổ, khí gas dễ cháy hoặc không cháy (như bình xịt phun sơn, khí butan, gas nạp hộp quẹt), khí làm lạnh (như bình dưỡng khí dưới nước, nitơ lỏng), chất lỏng dễ cháy (như sơn, chất pha loãng, dung môi); chất rắn dễ cháy (như diêm, bật lửa); hợp chất oxy hữu cơ (như nhựa cây); chất độc, chất lây nhiễm (như virut, vi khuẩn); chất phóng xạ (như Ra-đi); chất ăn mòn (như axit, kiềm, thủy ngân, nhiệt kế), chất có từ tính, vật liệu oxy hóa (như chất tẩy trắng).
baggage_note_II_4.12=k. Vũ khí như súng, kiếm, dao cổ và các vật phẩm tương tự, với điều kiện các vật phẩm đó có thể được phép vận chuyển dưới dạng hành lý ký gửi hoàn toàn theo quyết định của chúng tôi vì những lý do rất đặc biệt. Những thứ này không được phép mang lên máy bay vì bất kỳ lý do gì.
baggage_note_II_4.13=Hàng hóa có giá trị và dễ vỡ: Hành khách được khuyến cáo không ký gửi các vật phẩm này trong hành lý. Nếu các vật phẩm này được làm thủ tục Hành lý ký gửi, khách hàng đồng ý chịu mọi rủi ro vận chuyển. Các vật phẩm này bao gồm tiền, nữ trang, kim loại quý hiếm, đồ dùng bằng bạc, đồ điện tử, máy vi tính, máy ảnh, máy quay phim, giấy tờ có thể chuyển nhượng, chứng khoán, các giấy tờ có giá trị khác, hộ chiếu và giấy tờ tùy thân.
baggage_note_II_4.14=Quyền lục soát: Vì các lý do an toàn và an ninh, chúng tôi có thể yêu cầu quý khách và hành lý phải qua kiểm soát, soi chiếu bằng X-quang hoặc các hình thức soi chiếu khác. Chúng tôi có quyền kiểm tra vắng mặt hành lý của quý khách, nếu không tìm được quý khách, nhằm mục đích kiểm tra xem quý khách có hoặc hành lý của quý khách có chứa hàng hóa cấm hoặc không được chấp thuận. Nếu quý khách từ chối việc kiểm tra hoặc soi chiếu như vậy, chúng tôi có quyền từ chối vận chuyển quý khách và hành lý của quý khách mà không hoàn trả lại cước vận chuyển và không chịu trách nhiệm gì khác với quý khách. Trong trường hợp việc kiểm tra, soi chiếu gây ra thương tích cho quý khách hoặc tổn thất cho hành lý, chúng tôi không chịu trách nhiệm cho thương tích hoặc tổn thất đó, nếu không phải do lỗi hoặc sơ suất của chúng tôi.
baggage_note_II_4.15=Hành lý ký gửi: Sau khi hành lý được bàn giao cho chúng tôi để kiểm tra, chúng tôi sẽ bảo quản hành lý đó và phát hành một thẻ Hành lý cho mỗi kiện hành lý. Hành lý ký gửi phải có tên quý khách hoặc có nhận dạng cá nhân được gắn một cách an toàn trên đó. Hành lý ký gửi được vận chuyển trên cùng tàu bay với quý khách, trừ khi chúng tôi quyết định vận chuyển hành lý đó trên chuyến bay khác do các lý do an toàn, an ninh hoặc khai thác. Nếu hành lý của quý khách được vận chuyển trên chuyến bay sau, chúng tôi sẽ giao hành lý đó cho quý khách trong một khoảng thời gian hợp lý sau khi chuyến bay đó đến, trừ khi quý khách bắt buộc phải có mặt để làm thủ tục hải quan theo luật định.
baggage_note_II_4.16=Hành lý ký gửi: Một khoản phí hành lý được tính cho việc vận chuyển Hành lý ký gửi. Mỗi hành khách chỉ được mua duy nhất một gói Hành ký ký gửi. Hành khách có thể mua các gói Hành lý tiêu chuẩn 20kg, 30kg, 40kg, 50kg, 60kg, 70kg, 80kg, 90kg, 100kg (tùy theo hành trình bay), các gói Hành lý quá khổ 20kg, 30kg (hành khách có thể nâng hạn mức lên gói lớn hơn trước 3 tiếng so với giờ bay khởi hành dự kiến). Hành khách nào ký gửi hành lý vượt quá hạn mức hành lý đã mua khi đặt chỗ sẽ phải trả thêm phí tính theo từng kg tại quầy thủ tục đăng ký chuyến bay ở sân bay. Xin tham khảo thêm Biểu Phí của chúng tôi để có thêm chi tiết về mọi mức cước phí. Phí hành lý không được hoàn lại và không được chuyển nhượng.
baggage_note_II_4.17=Giao nhận hành lý: Quý khách sẽ nhận hành lý ngay khi hành lý được vận chuyển đến điểm đến. Nếu quý khách không nhận hành lý trong khoảng thời gian hợp lý và chúng tôi phải lưu giữ hành lý, chúng tôi có thể tính phí kho bãi. Nếu quý khách không nhận hành lý ký gởi của mình trong vòng 2 tháng, chúng tôi sẽ có thể vứt bỏ hành lý đó mà không phải chịu bất kỳ trách nhiệm nào với quý khách. Chỉ người có thẻ hành lý đã được cấp cho hành khách khi làm thủ tục hành lý mới được quyền nhận hành lý. Nếu người nhận hành lý không xuất trình được thẻ hành lý, chúng tôi sẽ chỉ giao hành lý cho người đó, nếu người đó chứng minh được với chúng tôi về quyền với hành lý đó, và nếu chúng tôi có yêu cầu thì người đó phải cung cấp đảm bảo thích hợp để bồi hoàn cho chúng tôi mọi mất mát, thiệt hại hoặc chi phí mà chúng tôi có thể phải chịu do việc bàn giao hành lý đó. Việc người giữ thẻ hành lý chấp nhận hành lý tại thời điểm bàn giao là chứng cứ hiển nhiên cho việc hành lý đã được bàn giao trong điều kiện tốt và phù hợp với hợp đồng vận chuyển với chúng tôi.

baggage_note_III=III/ Trách nhiệm đối với thiệt hại về hành lý ký gửi
baggage_note_III_1=Chúng tôi không chịu trách nhiệm đối với những Thiệt hại gây ra bởi các khiếm khuyết về mặt bản chất, chất lượng hay thiếu sót của Hành lý. Cũng như vậy, Chúng tôi sẽ không chịu trách nhiệm đối những hao mòn và rách vỡ một cách hợp lý của Hành lý gây ra bởi sự di chuyển và va đập thông thường khi vận chuyển bằng đường hàng không.
baggage_note_III_2=Chúng tôi bồi thường Thiệt hại về Hành lý cho Hành khách dựa trên nguyên tắc chung là bồi thường theo thiệt hại thực tế nhưng không vượt quá mức giới hạn trách nhiệm của Chúng tôi. Hành khách có trách nhiệm chứng minh thiệt hại thực tế đối với Hành lý của mình. Quy định chung về bồi thường hành lý thất lạc: Bồi thường theo cân nặng hành lý, tuyến quốc nội: 200,000 VND (hai trăm nghìn Đồng)/kg, tuyến quốc tế: 20 USD (hai mươi Đô-la Mỹ) /kg hoặc ngoại tệ tương đương.
baggage_note_III_3=Bồi thường hành lí kí gửi bị hư hỏng từng phần
baggage_note_III_4=(Tính theo VND)
baggage_note_III_4.1=Gãy tay kéo
baggage_note_III_4.2=Gãy bánh xe
baggage_note_III_4.3=Đứt dây kéo
baggage_note_III_4.4=Nứt hoặc dẹp
baggage_note_III_4.5=Rách
baggage_note_III_4.6=Lõm
baggage_note_III_4.7=Vỡ phần đáy túi (bánh xe)
baggage_note_III_5=Mức giới hạn trách nhiệm bồi thường Thiệt hại do mất mát, thiếu hụt, hư hỏng đối với Hành lý ký gửi và Hành lý xách tay là 1.288 (một nghìn hai trăm tám mươi tám) Đơn vị tính toán cho mỗi Hành khách;

baggage_note_IV=IV/ Trách nhiệm đối với các Thiệt hại xảy ra do Hành lý bị chậm chuyến:
baggage_note_IV_1=Quy định về chi tiền thiện chí đối với Hành lý vận chuyển chậm, khách không thể nhận lại Hành lý kí gửi trong vòng 24 tiếng kể từ giờ tàu bay đáp tại điểm đến trong hành trình bay và không phải thường trú cùng Tỉnh, Thành phố mà sân bay đến trực thuộc, áp dụng 180,000 VND (một trăm tám mươi nghìn Đồng)/khách đối với tuyến quốc nội, 300,000 VND (ba trăm nghìn Đồng)/khách đối với tuyến quốc tế và mức giới hạn trách nhiệm bồi thường Thiệt hại do vận chuyển chậm là 1288 (một nghìn hai trăm tám mươi tám) Đơn vị tính toán cho mỗi Hành khách.
baggage_note_IV_2=Chúng tôi không chịu trách nhiệm đối với những Thiệt hại về Hành lý gây ra bởi chậm chuyến nếu Chúng tôi chứng minh được rằng: (i) Chúng tôi và người đại diện của Chúng tôi đã thực hiện mọi biện pháp cần thiết một cách hợp lý để tránh Thiệt hại đó, hoặc (ii) Chúng tôi hoặc người đại diện của Chúng Tôi không thể thực hiện các biện pháp đó.

baggage_note_1=Xe đẩy trẻ em, xe lăn tay, các thiết bị hỗ trợ di chuyển cho hành khách thực hiện chuyến bay, sẽ được hỗ trợ vận chuyển miễn phí.
baggage_note_2=Em bé (dưới 2 tuổi) không được mang theo hành lý, mặc dù các loại xe đẩy, xe nôi được vận chuyển miễn phí.
baggage_note_3=Vì lý do sức khỏe và an toàn, hãng vận chuyển không chấp nhận bất kỳ kiện hành lý nào vượt quá 32kg, kích thước vượt quá 200cm x 119cm x 81cm.
baggage_note_4=Các kiện hành lý quá cỡ (các dụng cụ thể thao) có thể được vận chuyển trong khoang hàng, sau khi được thanh toán phí dịch vụ Hành lý quá cỡ theo quy định trong Biểu Phí, với giới hạn trách nhiệm rủi ro trong việc vận chuyển sẽ tuân theo giới hạn trách nhiệm vận chuyển Hành lý ký gửi trong Điều lệ vận chuyển ban hành bởi hãng. Do đó, quý khách nên mua bảo hiểm cần thiết cho các dụng cụ này.
baggage_note_5=Đối với các nhạc cụ lớn, hành khách có thể lựa chọn đăng ký dịch vụ Hành lý ký gửi quá cỡ hoặc mua thêm một ghế bên cạnh để đặt nhạc cụ trên tàu bay. Diện tích ghế để nhạc cụ lớn có quy định về kích thước tối đa là: 165cm x 44cm x 66cm và trọng lượng tối đa là 75kg. Tuy nhiên chỗ ngồi mua thêm không có tiêu chuẩn hành lý kèm theo.

