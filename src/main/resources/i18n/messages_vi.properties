privacy_II_1.desc=Khi quý khách sử dụng Dịch vụ, chúng tôi có thể thu thập các loại dữ liệu cá nhân sau:
privacy_II_1.1=Thông tin định danh
privacy_II_1.1_desc=Họ tên, ngày tháng năm sinh, giới tính, quốc tịch, ảnh chụp giấy tờ tuỳ thân, số chứng minh nhân dân/căn cước công dân/Số hộ chiếu. Những thông tin này giúp xác định chính xác danh tính của quý khách hoặc tổ chức mà quý khách đại diện.
privacy_II_1.2=Thông tin sinh trắc học
privacy_II_1.2_desc=Ảnh chân dung, video selfie, dữ liệu nhận diện khuôn mặt (nếu được sự đồng ý), vân tay (nếu áp dụng), dữ liệu từ ứng dụng định danh VNeID (nếu được chia sẻ).
privacy_II_1.3=Thông tin liên lạc
privacy_II_1.3_desc=Địa chỉ email, số điện thoại, địa chỉ nhà, hoặc các thông tin khác liên quan đến yêu cầu đặc biệt của quý khách (ví dụ: yêu cầu hỗ trợ y tế hoặc dịch vụ đặc biệt).
privacy_II_1.4=Thông tin thanh toán
privacy_II_1.4_desc=Thông tin thẻ tín dụng/thẻ ghi nợ, bao gồm tên chủ thẻ, số thẻ, ngày hết hạn, mã xác thực (CVV).
privacy_II_1.5=Thông tin đặt vé và giữ chỗ
privacy_II_1.5_desc=Chi tiết về chuyến bay, giá vé, ngày đặt vé, hành trình, thông tin giữ chỗ hoặc các dịch vụ bổ sung (như hành lý, suất ăn).
privacy_II_1.6=Thông tin chương trình Vietjet Skyjoy
privacy_II_1.6_desc=Số thẻ hội viên, hạng thẻ, số dư dặm thưởng, lịch sử giao dịch, ưu đãi và các thông tin liên quan đến tài khoản hội viên.
privacy_II_1.7=Thông tin tự động thu thập
privacy_II_1.7_desc=Dữ liệu được thu thập khi quý khách sử dụng website hoặc ứng dụng, bao gồm địa chỉ IP, loại trình duyệt, cookies, mã đăng nhập, lịch sử tìm kiếm hoặc các tương tác trực tuyến khác.
privacy_II_1.8=Thông tin từ trao đổi
privacy_II_1.8_desc=Nội dung giao tiếp giữa quý khách và Vietjet Air, bao gồm email, tin nhắn, cuộc gọi, khiếu nại, khảo sát, hoặc yêu cầu hủy đăng ký nhận bản tin.
privacy_II_1.9=Thông tin từ mạng xã hội
privacy_II_1.9_desc=Nếu quý khách đăng ký dịch vụ bằng tài khoản mạng xã hội, chúng tôi có thể nhận được thông tin như tên, email, sở thích, danh sách bạn bè, hoặc thông tin chuyến bay mà quý khách đã tìm kiếm, tùy thuộc vào cài đặt quyền riêng tư của tài khoản mạng xã hội.
privacy_II_1.10=Thông tin từ nền tảng thứ ba
privacy_II_1.10_desc=Dữ liệu định danh điện tử từ VNeID (nếu người dùng đồng ý), dữ liệu eKYC từ SDK của Galaxy Pay phục vụ thanh toán và xác thực.

privacy_II_2_title=2.2 Dữ liệu sử dụng
privacy_II_2_desc=Chúng tôi thu thập dữ liệu sử dụng tự động khi quý khách tương tác với Dịch vụ, bao gồm:
privacy_II_2_1=Địa chỉ IP, loại trình duyệt, phiên bản trình duyệt.
privacy_II_2_2=Các trang quý khách truy cập, thời gian truy cập, thời gian lưu lại trên trang.
privacy_II_2_3=Định danh thiết bị, dữ liệu chẩn đoán hoặc các thông tin khác liên quan đến hoạt động trực tuyến.
privacy_II_2_4=Sinh trắc học: Vân tay/Khuôn mặt (Khi sử dụng VNeID hoặc GPay nếu được đồng ý).
privacy_II_3_title=2.3 Thông tin thu thập từ Ứng dụng
privacy_II_3_desc=Khi sử dụng Ứng dụng Vietjet Air, với sự cho phép của quý khách, chúng tôi có thể thu thập:

location_data = Dữ liệu vị trí
access_photo_library = Quyền truy cập thư viện ảnh
access_ewallet_sdk = Quyền truy cập ví điện tử (SDK)
privacy_II_3_1=Để cung cấp các dịch vụ liên quan đến địa điểm, như thông tin sân bay gần nhất.
privacy_II_3_2=Để hỗ trợ thay đổi ảnh hồ sơ hoặc các tính năng liên quan đến hình ảnh.
privacy_II_3_3=Bao gồm quyền truy cập Internet, camera (để quét mã QR), danh bạ (để xác định liên hệ sử dụng ví SkyPay), hoặc sinh trắc học (để thanh toán bằng vân tay). Quý khách có thể bật/tắt các quyền này bất kỳ lúc nào thông qua cài đặt thiết bị.
privacy_II_4_title=2.4 Công nghệ theo dõi và Cookies
privacy_II_4_desc=Chúng tôi sử dụng cookies và các công nghệ theo dõi tương tự (như web beacons) để:
privacy_II_4_1=Theo dõi hoạt động của quý khách trên website và ứng dụng.
privacy_II_4_2=Lưu trữ thông tin như tùy chọn ngôn ngữ, lịch sử tìm kiếm hoặc dữ liệu phiên đăng nhập.
privacy_II_4_3=Phân tích hành vi người dùng để cải thiện dịch vụ.
privacy_II_4_cookie_types=Cookies có thể bao gồm:
privacy_II_4_session=Cookies phiên (xóa sau khi đóng trình duyệt).
privacy_II_4_persistent=Cookies cố định (lưu trữ lâu dài trên thiết bị). Quý khách có thể quản lý cookies qua cài đặt trình duyệt hoặc tham khảo Chính sách Cookies của chúng tôi để biết thêm chi tiết.

privacy_III_3_title=3. Mục đích thu thập Dữ liệu cá nhân
privacy_III_3_desc=Vietjet Air thu thập và xử lý dữ liệu cá nhân của Quý khách nhằm cung cấp dịch vụ tốt nhất, đảm bảo an toàn, tuân thủ pháp luật và nâng cao trải nghiệm khách hàng. Dưới đây là các mục đích cụ thể:

privacy_III_3_1_title=3.1 Thực hiện Hợp đồng và cung cấp Dịch vụ
privacy_III_3_1_1=Xuất vé và vận chuyển: Sử dụng thông tin định danh (họ tên, số hộ chiếu/số căn cước, ngày sinh) và thông tin liên lạc để hoàn tất quá trình đặt vé, xuất vé, checkin, xác thực danh tính, tự động kiểm tra tại sân bay (auto-gate), thông báo thay đổi lịch bay hoặc cung cấp các dịch vụ liên quan đến hành trình của Quý khách.
privacy_III_3_1_2=Xác minh danh tính và phòng chống gian lận: Tích hợp dữ liệu từ VNeID và Galaxy Pay để thực hiện xác thực eKYC an toàn. Đối với tính năng check-in trực tuyến, chúng tôi sử dụng dữ liệu sinh trắc học (như ảnh chân dung, dữ liệu nhận diện khuôn mặt) để xác minh danh tính hành khách, giúp giảm thiểu thời gian làm thủ tục và nâng cao độ chính xác.
privacy_III_3_1_3=Dịch vụ đặc biệt: Thu thập thông tin nhạy cảm (như yêu cầu chăm sóc y tế, suất ăn đặc biệt) với sự đồng ý của quý khách để cung cấp dịch vụ phù hợp, chẳng hạn hỗ trợ hành khách có nhu cầu y tế hoặc chế độ ăn riêng.
privacy_III_3_1_4=Tối ưu hóa trải nghiệm người dùng: Phân tích dữ liệu sử dụng để cải thiện giao diện, nội dung, hiệu năng ứng dụng.
privacy_III_3_1_5=Tiếp thị và thông báo khuyến mãi (nếu được đồng ý): Gửi các thông báo tiếp thị, ưu đãi phù hợp với hành vi sử dụng.
privacy_III_3_1_6=Tuân thủ nghĩa vụ pháp lý: Bao gồm cung cấp thông tin cho cơ quan chức năng nếu có yêu cầu hợp pháp.

privacy_III_3_2_title=3.2 Quản lý Chương trình Vietjet Skyjoy
privacy_III_3_2_1=Cập nhật thông tin hội viên: Gửi thông báo về chính sách mới, ưu đãi, khuyến mãi hoặc thay đổi điều khoản chương trình.
privacy_III_3_2_2=Quản lý đặt vé và dịch vụ: Sử dụng thông tin tài khoản hội viên để hỗ trợ đặt vé, xuất vé, tích lũy dặm thưởng hoặc đổi quà.
privacy_III_3_2_3=Phân tích dữ liệu: Đánh giá lịch sử bay và sở thích của hội viên để cung cấp giá vé, dịch vụ hoặc ưu đãi phù hợp.
privacy_III_3_2_4=Hỗ trợ khách hàng: Giải quyết thắc mắc, khiếu nại hoặc yêu cầu từ hội viên để nâng cao chất lượng dịch vụ.

privacy_III_3_3_title=3.3 Hỗ trợ Thanh toán qua Cổng Galaxy Pay
privacy_III_3_3_1=Xác thực giao dịch: Sử dụng thông tin cá nhân (họ tên, số thẻ, dữ liệu định danh) để xác minh danh tính chủ tài khoản, đảm bảo giao dịch hợp pháp và an toàn.
privacy_III_3_3_2=Phòng ngừa gian lận: Lưu trữ dữ liệu theo quy trình EKYC để phát hiện và ngăn chặn các hành vi giả mạo hoặc gian lận.
privacy_III_3_3_3=Tuân thủ pháp luật: Cung cấp thông tin thanh toán khi có yêu cầu từ Ngân hàng Nhà nước Việt Nam hoặc cơ quan chức năng để phục vụ kiểm tra, thanh tra hoặc kiểm toán.

privacy_III_3_4_title=3.4 Đảm bảo An ninh và An toàn Hàng không
privacy_III_3_4_1=Kiểm tra hành khách: Xác minh danh tính trước khi lên tàu bay để đảm bảo an toàn cho chuyến bay.
privacy_III_3_4_2=Danh sách hạn chế: Duy trì danh sách hành khách bị từ chối vận chuyển để bảo vệ cộng đồng.
privacy_III_3_4_3=Chia sẻ thông tin với cơ quan chức năng: Cung cấp Dữ liệu cá nhân, thông tin đặt vé hoặc hành trình cho các cơ quan quản lý biên giới, hải quan, nhập cư hoặc an ninh để tuân thủ quy định pháp luật và ngăn chặn các hoạt động bất hợp pháp.

privacy_III_3_5_title=3.5 Thực hiện Nghĩa vụ Kế toán và Tài chính
privacy_III_3_5_1=Lưu trữ hồ sơ: Thu thập và lưu trữ thông tin giao dịch để phục vụ các mục đích kế toán, báo cáo tài chính hoặc kiểm toán.
privacy_III_3_5_2=Tuân thủ pháp luật: Đáp ứng các yêu cầu về thuế, kiểm tra tài chính hoặc các nghĩa vụ pháp lý khác theo quy định.

privacy_III_3_6_title=3.6 Chăm sóc Khách hàng
privacy_III_3_6_1=Giải quyết thắc mắc và khiếu nại: Sử dụng thông tin liên lạc để trả lời câu hỏi, xử lý khiếu nại hoặc hỗ trợ yêu cầu từ Quý khách.
privacy_III_3_6_2=Cải thiện dịch vụ: Phân tích Dữ liệu cá nhân và phản hồi để nâng cấp website, ứng dụng, quy trình phục vụ hoặc thiết kế ưu đãi phù hợp.
privacy_III_3_6_3=Khảo sát ý kiến: Thực hiện các cuộc khảo sát để hiểu rõ nhu cầu và mức độ hài lòng của quý khách, từ đó cải thiện trải nghiệm dịch vụ.
privacy_III_3_6_4=Hỗ trợ nhanh chóng: Sử dụng thông tin định danh và lịch sử giao dịch để cung cấp hỗ trợ cá nhân hóa, giúp giải quyết vấn đề nhanh hơn.

privacy_III_3_7_title=3.7 Liên hệ với Quý khách
privacy_III_3_7_1=Thông báo dịch vụ: Gửi thông tin về chuyến bay, thay đổi lịch trình, hoặc các cập nhật quan trọng liên quan đến hành trình của Quý khách.
privacy_III_3_7_2=Hỗ trợ chương trình khách hàng thường xuyên: Liên hệ để giải đáp thắc mắc, cung cấp thông tin về dặm thưởng hoặc ưu đãi dành riêng cho hội viên Vietjet Skyjoy.

privacy_III_3_8_title=3.8 Tiếp thị Trực tiếp (với Sự Đồng ý của Quý khách)
privacy_III_3_8_1=Gửi khuyến mãi: Cung cấp thông tin về ưu đãi, giá vé đặc biệt, dịch vụ bổ sung hoặc sản phẩm liên quan đến hàng không qua email, tin nhắn hoặc bản tin.
privacy_III_3_8_2=Cá nhân hóa quảng cáo: Phân tích sở thích và lịch sử sử dụng để gửi các ưu đãi phù hợp với nhu cầu của Quý khách.
privacy_III_3_8_3=Quản lý chiến dịch tiếp thị: Liên hệ để thông báo về các chương trình khuyến mãi hoặc khảo sát nhằm nâng cao trải nghiệm khách hàng.
privacy_III_3_8_4=Hủy nhận thông báo: Quý khách có thể từ chối nhận thông tin quảng cáo, tiếp thị bất kỳ lúc nào bằng cách nhấp vào liên kết hủy đăng ký trong email hoặc liên hệ trực tiếp với chúng tôi.

privacy_III_3_final_note=Chúng tôi chỉ sử dụng Dữ liệu cá nhân cho mục đích tiếp thị khi có sự đồng ý rõ ràng từ quý khách. Quý khách có quyền rút lại sự đồng ý này bất kỳ lúc nào mà không ảnh hưởng đến các dịch vụ khác.

privacy_IV_title=4. Lưu trữ và chuyển giao Dữ liệu Cá nhân

privacy_IV_1_title=4.1 Lưu trữ Dữ liệu cá nhân
privacy_IV_4_1_1=Dữ liệu cá nhân của Quý khách được lưu trữ trên hệ thống nội bộ của Vietjet Air trong suốt thời gian cung cấp Dịch vụ, cho đến khi hoàn thành mục đích thu thập hoặc khi pháp luật cho phép.
privacy_IV_4_1_2=Chúng tôi sẽ xóa dữ liệu khi không còn cần thiết, trừ trường hợp phải lưu giữ để tuân thủ nghĩa vụ pháp lý hoặc giải quyết tranh chấp.
privacy_IV_4_1_3=Thời gian lưu trữ dữ liệu sinh trắc học sẽ chỉ được lưu trữ trong thời hạn cần thiết để phục vụ việc check-in trực tuyến và xác thực tại sân bay, trừ khi pháp luật có quy định khác hoặc theo yêu cầu từ cơ quan có thẩm quyền. Sau thời hạn đó, dữ liệu sẽ được xóa hoặc hủy bỏ theo quy trình bảo mật nội bộ của Vietjet Air.

privacy_IV_4_2_title=4.2 Chuyển giao Dữ liệu cá nhân
privacy_IV_4_2_1=Dữ liệu cá nhân có thể được xử lý tại các văn phòng của Vietjet Air hoặc bởi các Đối tác, Nhà cung cấp dịch vụ ở các quốc gia khác, nơi luật bảo vệ dữ liệu có thể khác với Việt Nam.
privacy_IV_4_2_2=Chúng tôi đảm bảo mọi hoạt động chuyển giao dữ liệu được thực hiện an toàn, tuân thủ chính sách này và các quy định pháp luật hiện hành.
privacy_IV_4_2_3=Vietjet Air cam kết kiểm tra chính sách bảo mật của các bên nhận dữ liệu để đảm bảo họ áp dụng các tiêu chuẩn bảo mật tương đương.

privacy_IV_4_3_title=4.3 Chia sẻ Dữ liệu cá nhân với Đối tác
privacy_IV_4_3_1=Đơn vị thuộc Chính phủ/Cơ quan quản lý: Trung tâm dữ liệu quốc gia về dân cư, cơ quan an ninh, hải quan, nhập cư (khi được yêu cầu).
privacy_IV_4_3_2=Đối tác công nghệ: Galaxy Pay (SDK tích hợp xác thực thanh toán), đơn vị cung cấp dịch vụ eKYC, ACV (quản lý cổng kiểm tra tự động).
privacy_IV_4_3_3=Đối tác trong tập đoàn Vietjet: Nhằm hỗ trợ hoạt động chương trình hội viên, thanh toán, và xử lý dịch vụ hành khách.

privacy_IV_4_3_note=Mọi đối tác nhận dữ liệu đều bị ràng buộc bởi hợp đồng bảo mật, chỉ được sử dụng dữ liệu cho các mục đích được chỉ định bởi Vietjet Air.

privacy_V_title=5. Quyền của Quý khách đối với Dữ liệu Cá nhân

privacy_V_intro=Quý khách có các quyền sau đây liên quan đến dữ liệu cá nhân của mình:
privacy_V_1=Quyền truy cập: Yêu cầu Vietjet Air xác nhận dữ liệu đang được xử lý, cung cấp chi tiết về loại dữ liệu, mục đích xử lý và danh sách bên nhận dữ liệu.
privacy_V_2=Quyền chỉnh sửa: Yêu cầu sửa đổi thông tin không chính xác hoặc bổ sung thông tin còn thiếu.
privacy_V_3=Quyền xóa dữ liệu: Yêu cầu xóa Dữ liệu cá nhân khi không còn cần thiết, bị xử lý bất hợp pháp hoặc theo quy định pháp luật.
privacy_V_4=Quyền hạn chế xử lý: Yêu cầu giới hạn cách thức xử lý dữ liệu mà không cần xóa hoàn toàn.
privacy_V_5=Quyền chuyển dữ liệu: Nhận lại Dữ liệu cá nhân hoặc chuyển Dữ liệu sang tổ chức khác theo định dạng phù hợp.
privacy_V_6=Quyền phản đối: Phản đối việc sử dụng Dữ liệu cá nhân cho mục đích tiếp thị hoặc các mục đích không cần thiết.
privacy_V_7=Quyền rút lại sự đồng ý: Rút lại sự đồng ý cho phép xử lý Dữ liệu, tuy nhiên điều này không ảnh hưởng đến tính hợp pháp của dữ liệu đã xử lý trước đó.
privacy_V_8=Quyền khiếu nại: Nộp đơn khiếu nại với cơ quan chức năng nếu Vietjet Air vi phạm quy định bảo vệ dữ liệu.
privacy_V_9=Quyền rút lại sự đồng ý chia sẻ dữ liệu: Khách hàng có thể yêu cầu rút lại sự đồng ý chia sẻ Dữ liệu cá nhân trên ứng dụng VNeID hoặc GPay bất kì lúc nào.

privacy_V_note=Lưu ý: Một số dữ liệu có thể được giữ lại nếu Vietjet Air có nghĩa vụ pháp lý hoặc cơ sở pháp lý để duy trì.

privacy_VI_title=6. Tiết lộ Dữ liệu Cá nhân

privacy_VI_1_title=6.1 Giao dịch Kinh doanh
privacy_VI_1_1=Trong trường hợp Vietjet Air tham gia sáp nhập, mua bán tài sản hoặc tái cấu trúc, Dữ liệu cá nhân có thể được chuyển giao. Chúng tôi sẽ thông báo trước để quý khách nắm rõ.

privacy_VI_2_title=6.2 Đối tác và Nhà cung cấp Dịch vụ
privacy_VI_2_1=Dữ liệu cá nhân có thể được chia sẻ với các nhà thầu hoặc đối tác (như hãng hàng không khác, công ty xử lý thanh toán, nhà cung cấp dịch vụ mặt đất) để hoàn thành giao dịch hoặc cung cấp Dịch vụ theo yêu cầu.
privacy_VI_2_2=Các đối tác này bị cấm sử dụng dữ liệu ngoài mục đích đã thỏa thuận với Vietjet Air.

privacy_VI_3_title=6.3 Cơ quan Thực thi Pháp luật
privacy_VI_3_1=Vietjet Air có thể tiết lộ Dữ liệu cá nhân nếu được yêu cầu bởi cơ quan chức năng, tòa án hoặc để tuân thủ các quy định về an ninh, hải quan, nhập cư hoặc chống khủng bố.
privacy_VI_3_2=Dữ liệu cá nhân cũng có thể được chia sẻ để ngăn chặn mối đe dọa đến an toàn, bảo vệ quyền lợi của Vietjet Air hoặc điều tra hành vi bất hợp pháp.

privacy_VII_title=7. Bảo mật Dữ liệu Cá nhân

privacy_VII_intro=Chúng tôi áp dụng các biện pháp kỹ thuật, tổ chức và vật lý để bảo vệ Dữ liệu cá nhân khỏi truy cập trái phép, mất mát hoặc hư hại:

privacy_VII_1=Mã hóa và bảo mật: Dữ liệu nhạy cảm được mã hóa và lưu trữ trong hệ thống có mật khẩu, giới hạn truy cập chỉ dành cho nhân viên được ủy quyền.
privacy_VII_2=Tường lửa và phần mềm bảo mật: Sử dụng tường lửa, phần mềm diệt virus và hệ thống phát hiện xâm nhập để ngăn chặn tấn công mạng.
privacy_VII_3=Quản lý nội bộ: Đào tạo nhân viên về bảo mật, giám sát thường xuyên và áp dụng chính sách bảo mật nghiêm ngặt.
privacy_VII_4=Bảo mật vật lý: Sử dụng khóa an ninh, camera giám sát và kiểm soát truy cập vào các khu vực lưu trữ Dữ liệu cá nhân.

privacy_VII_note=Mặc dù chúng tôi nỗ lực hết sức, không phương thức truyền tải hoặc lưu trữ nào đảm bảo an toàn tuyệt đối. Vietjet Air cam kết xử lý kịp thời mọi sự cố bảo mật nếu xảy ra.

privacy_VIII_title=8. Tính minh bạch và kiểm soát từ phía người dùng
privacy_VIII_intro=Ứng dụng của Vietjet sẽ yêu cầu rõ ràng sự cho phép truy cập vào các quyền như:
privacy_VIII_1=Vị trí, camera, bộ nhớ thiết bị (nếu có liên quan đến chức năng).
privacy_VIII_2=Các yêu cầu truy cập này sẽ được thông báo rõ ràng theo tiêu chuẩn của Google và Apple.

privacy_IX_title=9. Quyền Riêng tư của Trẻ em
privacy_IX_1=Đối với trẻ em dưới 14 tuổi (Hàn Quốc) hoặc dưới độ tuổi tối thiểu theo quy định của từng quốc gia thành viên EU (13-16 tuổi tùy quốc gia), Vietjet Air chỉ thu thập dữ liệu với sự đồng ý của cha mẹ hoặc người giám hộ hợp pháp.
privacy_IX_2=Cha mẹ/người giám hộ có thể yêu cầu xem, chỉnh sửa hoặc rút lại sự đồng ý bất kỳ lúc nào thông qua các kênh liên hệ chính thức.

privacy_X_title=10. Liên kết đến Trang web Khác
privacy_X_content=Website và ứng dụng của chúng tôi có thể chứa liên kết đến các trang web bên thứ ba. Chúng tôi không kiểm soát hoặc chịu trách nhiệm về chính sách bảo mật của các trang này. Quý khách nên xem xét kỹ chính sách bảo mật của các trang web bên thứ ba trước khi cung cấp thông tin.

privacy_XI_title=11. Xử lý Vi phạm Dữ liệu
privacy_XI_intro=Nếu xảy ra vi phạm trong quá trình xử lý Dữ liệu cá nhân, Vietjet Air sẽ:
privacy_XI_1=Thông báo cho Quý khách và cơ quan chức năng trong thời gian sớm nhất theo quy định pháp luật.
privacy_XI_2=Cung cấp thông tin về bản chất vi phạm, hậu quả tiềm tàng, biện pháp khắc phục và thông tin liên hệ để Quý khách yêu cầu hỗ trợ.
privacy_XI_note=Chúng tôi có thể được miễn thông báo nếu dữ liệu đã được mã hóa, vi phạm không gây rủi ro cao hoặc thông báo không thể thực hiện được. Trong trường hợp này, chúng tôi sẽ sử dụng các kênh công khai để thông báo.

privacy_XII_title=12. Thay đổi Chính sách Bảo mật
privacy_XII_content=Chúng tôi có thể cập nhật chính sách này để phản ánh thay đổi trong quy trình xử lý dữ liệu hoặc quy định pháp luật. Mọi thay đổi sẽ được thông báo qua email hoặc trên website trước khi có hiệu lực, kèm theo ngày “Cập nhật lần cuối”. Quý khách nên kiểm tra định kỳ để cập nhật thông tin mới nhất.

