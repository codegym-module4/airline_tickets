privacy_thankYou_2=, ứng dụng di động, chương trình hội viên Vietjet Skyjoy, trung tâm hỗ trợ khách hàng hoặc các đại lý phòng vé. Chúng tôi cam kết tôn trọng và bảo vệ quyền riêng tư của quý khách, đảm bảo rằng mọi thông tin cá nhân được thu thập sẽ được xử lý an toàn và minh bạch theo quy định pháp luật. Chính sách Bảo mật này giải thích cách chúng tôi thu thập, sử dụng, lưu trữ, chia sẻ và bảo vệ dữ liệu cá nhân của quý khách, đồng thời nêu rõ các quyền của quý khách liên quan đến dữ liệu cá nhân của mình, bao gồm các cập nhật liên quan đến dữ liệu cá nhân được tích hợp trên hệ thống VNeID và Galaxy Pay (GPay).
privacy_scope=Chính sách này áp dụng cho mọi dữ liệu cá nhân mà quý khách đồng ý cung cấp, chia sẻ cho chúng tôi trong quá trình sử dụng dịch vụ của Vietjet Air. Chúng tôi khuyến nghị quý khách đọc kỹ chính sách này để hiểu rõ cách chúng tôi xử lý dữ liệu cá nhân của quý khách.

