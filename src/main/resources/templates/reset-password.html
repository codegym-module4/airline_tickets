<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{user/layouts/head::head('Đặt lại mật khẩu - Vietjet Air')}"></head>
<body style="background: url('/user/img/background-main.jpg'); background-size: cover;">
<main class="py-0">
    <th:block th:replace="~{user/layouts/header::header}"></th:block>
    <div class="container mt-5 d-flex justify-content-center">
        <div class="booking-form" style="max-width: 400px; padding: 20px; border-radius: 5px;">
            <h2 class="text-white text-center">Đặt lại mật khẩu</h2>
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <form th:action="@{/reset-password}" method="post" class="mt-3">
                <input type="hidden" name="email" th:value="${email}"/>
                <div class="mb-3">
                    <label for="code" class="form-label text-white">Mã xác nhận:</label>
                    <input type="text" id="code" name="code" class="form-control" required/>
                </div>
                <div class="mb-3">
                    <label for="newPassword" class="form-label text-white">Mật khẩu mới:</label>
                    <input type="password" id="newPassword" name="newPassword" class="form-control" required minlength="6"/>
                </div>
                <button type="submit" class="btn btn-custom w-100">Xác nhận</button>
            </form>
        </div>
    </div>
    <th:block th:replace="~{user/layouts/footer::footer}"></th:block>
</main>
<th:block th:replace="~{user/layouts/script::script}"></th:block>
</body>
</html>
