    <!DOCTYPE html>
    <html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Revenue Chart</title>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link rel="stylesheet" th:href="@{/admin/css/chart.css}">
    </head>
    <body>

    <div class="chart-container">
        <canvas id="revenueChart" height="600px"></canvas>
    </div>


    <div class="export-button-container">
        <p class="export-button" onclick="exportFile()">Xuất File</p>
    </div>

    <!--Phải dùng th:inline mới áp dụng được cho thymeleaf-->
    <script th:inline="javascript">
        // Lấy dữ liệu từ controller
        var totalRevenue = /*[[${totalRevenue}]]*/ [];
        var chartType = /*[[${reportContent}]]*/ 'line';

        var dates = [];
        var revenues = [];

        totalRevenue.forEach(function(revenue) {
            dates.push(revenue.date);
            revenues.push(revenue.revenue);
        });

        // Tạo biểu đồ
        var ctx = document.getElementById('revenueChart').getContext('2d');
        var revenueChart = new Chart(ctx, {
            type: chartType,
            data: {
                labels: dates,
                datasets: [{
                    label: 'Doanh thu (VND)',
                    data: revenues,
                    borderColor: 'blue',
                    borderWidth: 2,
                    pointRadius: 4,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: {
                    padding: {
                        top: 150,
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            font: {
                                size: 12
                            }
                        }
                    },
                    y: {
                        ticks: {
                            font: {
                                size: 12
                            }
                        }
                    }
                }
            }
        });

        function exportFile() {

            // Lấy ảnh biểu đồ từ canvas
            const canvas = document.getElementById('revenueChart');
            const image = canvas.toDataURL('image/png');

            $.ajax({
                url: '/admin/export-excel',
                type: 'POST',
                contentType: 'application/json', //gửi đến backend là json
                data: JSON.stringify({
                    totalRevenue: totalRevenue,
                    chartImage: image
                }),
                xhrFields: {
                    responseType: 'blob' // nhận về dữ liệu nhị phân (binary) như file, ảnh, Excel, PDF..từ backend
                },
                success: function(blob) {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = "report.xlsx";
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                },
                error: function() {
                    alert("Xuất file thất bại!");
                }
            })
        }

    </script>

    </body>
    </html>
