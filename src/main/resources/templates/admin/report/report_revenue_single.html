    <!DOCTYPE html>
    <html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Revenue Chart</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link rel="stylesheet" th:href="@{/admin/css/chart.css}">
    </head>
    <body>

    <div class="chart-container">
        <canvas id="revenueChart" height="600px"></canvas>
    </div>


    <!-- Form ẩn để gửi dữ liệu totalRevenue -->
    <form id="exportForm" action="/admin/export-excel" method="POST" style="display: none;">
        <input type="hidden" name="totalRevenue" id="totalRevenueData" />
    </form>

    <div class="export-button-container">
        <p class="export-button" onclick="exportFile()">Xuất File</p>
    </div>

    <!--Phải dùng th:inline mới áp dụng được cho thymeleaf-->
    <script th:inline="javascript">
        // Lấy dữ liệu từ controller
        var totalRevenue = /*[[${totalRevenue}]]*/ [];
        var chartType = /*[[${reportContent}]]*/ 'line';

        var dates = [];
        var revenues = [];

        totalRevenue.forEach(function(revenue) {
            dates.push(revenue.date);
            revenues.push(revenue.revenue);
        });

        // Tạo biểu đồ
        var ctx = document.getElementById('revenueChart').getContext('2d');
        var revenueChart = new Chart(ctx, {
            type: chartType,
            data: {
                labels: dates,
                datasets: [{
                    label: 'Doanh thu (VND)',
                    data: revenues,
                    borderColor: 'blue',
                    borderWidth: 2,
                    pointRadius: 4,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: {
                    padding: {
                        top: 150,
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            font: {
                                size: 12
                            }
                        }
                    },
                    y: {
                        ticks: {
                            font: {
                                size: 12
                            }
                        }
                    }
                }
            }
        });

        function exportFile() {
            var totalRevenueData = JSON.stringify(totalRevenue);  // Chuyển dữ liệu thành chuỗi JSON
            document.getElementById('totalRevenueData').value = totalRevenueData;  // Đưa dữ liệu vào input ẩn

            // Submit form gửi dữ liệu tới controller
            document.getElementById('exportForm').submit();
        }
    </script>

    </body>
    </html>
