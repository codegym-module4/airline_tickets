<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Chart</title>
    <link rel="stylesheet" th:href="@{/admin/css/chart.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<!-- biểu đồ -->
<div class="chart-container">
    <canvas id="revenueChart" height="600px"></canvas>
</div>

<!-- Form ẩn để gửi dữ liệu totalRevenue -->
<form id="exportForm" action="/admin/export-excel2" method="POST" style="display: none;">
    <input type="hidden" name="totalSumRevenue" id="totalSumRevenueData" />
    <input type="hidden" name="totalSumCompareRevenue" id="totalSumCompareRevenueData" />
</form>

<div class="export-button-container">
    <p class="export-button" onclick="exportFile()">Xuất File</p>
</div>

<script th:inline="javascript">
    // Lấy dữ liệu từ controller
    var totalSumRevenue = /*[[${totalSumRevenue}]]*/ 0;
    var totalSumCompareRevenue = /*[[${totalSumCompareRevenue}]]*/ 0;
    var chartType = /*[[${reportContent}]]*/ 'bar';

    var ctx = document.getElementById('revenueChart').getContext('2d');
    var chartData;

    if (chartType === 'line') {
        chartData = {
            labels: ['Thời gian chính', 'Thời gian so sánh'],
            datasets: [{
                label: 'So sánh doanh thu',
                data: [totalSumRevenue, totalSumCompareRevenue],
                borderColor: 'blue',
                backgroundColor: 'rgba(54, 162, 235, 0.5)',
                fill: false,
                tension: 0.4,
                pointBackgroundColor: ['blue', 'green'],
                pointBorderColor: ['blue', 'green'],
                pointRadius: 6
            }]
        };
    } else if (chartType === 'pie') {
        var total = totalSumRevenue + totalSumCompareRevenue;
        var percentRevenue = total > 0 ? (totalSumRevenue / total * 100).toFixed(2) : 0;
        var percentCompare = total > 0 ? (totalSumCompareRevenue / total * 100).toFixed(2) : 0;

        chartData = {
            labels: ['Thời gian chính (' + percentRevenue + '%)', 'Thời gian so sánh (' + percentCompare + '%)'],
            datasets: [{
                data: [totalSumRevenue, totalSumCompareRevenue],
                backgroundColor: ['blue', 'green'],
                hoverOffset: 10
            }]
        };
    } else {
        chartData = {
            labels: ['So sánh Doanh Thu'],
            datasets: [
                {
                    label: 'Thời gian chính',
                    data: [totalSumRevenue],
                    backgroundColor: 'blue'
                },
                {
                    label: 'Thời gian so sánh',
                    data: [totalSumCompareRevenue],
                    backgroundColor: 'green'
                }
            ]
        };
    }

    var revenueChart = new Chart(ctx, {
        type: chartType,
        data: chartData,
        options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: {
                padding: {
                    top: 150,
                }
            },
            plugins: {
                legend: {
                    labels: {
                        font: {size: 14}
                    }
                }
            },
            scales: (chartType !== 'pie') ? {
                x: {ticks: {font: {size: 12}}},
                y: {ticks: {font: {size: 12}}}
            } : {}
        }
    });

    function exportFile() {
        document.getElementById('totalSumRevenueData').value = totalSumRevenue;
        document.getElementById('totalSumCompareRevenueData').value = totalSumCompareRevenue;
        document.getElementById('exportForm').submit();
    }
</script>


</body>
</html>
