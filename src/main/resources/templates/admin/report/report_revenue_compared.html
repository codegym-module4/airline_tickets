<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Chart</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" th:href="@{/admin/css/chart.css}">

</head>
<body>

<!-- biểu đồ -->
<div class="chart-container">
    <canvas id="revenueChart" height="600px"></canvas>
</div>


<div class="export-button-container">
    <p class="export-button" onclick="exportFile()">Xuất File</p>
</div>

<script th:inline="javascript">

    // Lấy dữ liệu từ controller
    var totalSumRevenue = /*[[${totalSumRevenue}]]*/ 0;
    var totalSumCompareRevenue = /*[[${totalSumCompareRevenue}]]*/ 0;
    var chartType = /*[[${reportContent}]]*/ 'bar';

    var mainRevenue = /*[[${mainRevenue}]]*/ [];
    var compareRevenue = /*[[${compareRevenue}]]*/ [];

    var ctx = document.getElementById('revenueChart').getContext('2d');
    var chartData;

    if (chartType === 'line') {
        chartData = {
            labels: ['Thời gian chính', 'Thời gian so sánh'],
            datasets: [{
                label: 'So sánh doanh thu',
                data: [totalSumRevenue, totalSumCompareRevenue],
                borderColor: 'blue',
                backgroundColor: 'rgba(54, 162, 235, 0.5)',
                fill: false,
                tension: 0.4,
                pointBackgroundColor: ['blue', 'green'],
                pointBorderColor: ['blue', 'green'],
                pointRadius: 6
            }]
        }
    } else {
        chartData = {
            labels: ['So sánh Doanh Thu'],
            datasets: [
                {
                    label: 'Thời gian chính',
                    data: [totalSumRevenue],
                    backgroundColor: 'blue'
                },
                {
                    label: 'Thời gian so sánh',
                    data: [totalSumCompareRevenue],
                    backgroundColor: 'green'
                }
            ]
        };
    }

    var revenueChart = new Chart(ctx, {
        type: chartType,
        data: chartData,
        options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: {
                padding: {
                    top: 150,
                }
            },
            plugins: {
                legend: {
                    labels: {
                        font: {size: 14}
                    }
                }
            },
            scales: (chartType !== 'pie') ? {
                x: {ticks: {font: {size: 12}}},
                y: {ticks: {font: {size: 12}}}
            } : {}
        }
    });

    function exportFile() {

        const canvas = document.getElementById('revenueChart');
        const image = canvas.toDataURL('image/png');

        $.ajax({
            url: '/admin/export-excel2',
            type: 'POST',
            contentType: 'application/json', //gửi đến backend là json
            data: JSON.stringify({
                totalSumRevenue: totalSumRevenue,
                totalSumCompareRevenue: totalSumCompareRevenue,
                chartImage: image,
                mainRevenue: mainRevenue,
                compareRevenue: compareRevenue
            }),
            xhrFields: {
                responseType: 'blob' // nhận về dữ liệu nhị phân (binary) như file, ảnh, Excel, PDF..từ backend
            },
            success: function(blob) {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "report.xlsx";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            },
            error: function() {
                alert("Xuất file thất bại!");
            }
        })
    }
</script>


</body>
</html>
