<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Báo Cáo</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar {
            background-color: red;
            padding: 10px 20px;
        }

        .navbar-brand, .navbar .btn, .nav-link {
            color: white !important;
        }

        .table th {
            background-color: red;
            color: white;
        }

        .btn-primary {
            background-color: red;
            border-color: red;
        }

        .btn-danger {
            background-color: darkred;
            border-color: darkred;
        }
    </style>
</head>
<body class="bg-gray-100">

<!-- Thanh điều hướng -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Hệ Thống Quản Lý</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon" style="background-color: white;"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/employees}">Nhân Viên</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/flights}">Chuyến Bay</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/tickets}">Vé Máy Bay</a>
                </li>
            </ul>
            <div class="d-flex gap-2">
                <button class="btn">Admin</button>
                <button class="btn">Đăng Xuất</button>
            </div>
        </div>
    </div>
</nav>

<div class="flex justify-center mt-8">
    <div class="w-full max-w-xl bg-white border border-gray-300 p-6 rounded-lg shadow">
        <h1 class="text-center font-bold mb-4">Tạo Báo Cáo</h1>

        <!-- Form bắt đầu -->
        <form method="POST" action="/admin/create">
            <div class="border border-gray-300 p-4">
                <div class="mb-4">
                    <label class="block mb-2">Chọn kiểu</label>
                    <select class="border border-gray-300 p-2 w-full" name="reportContent">
                        <option value="bar">Bar</option>
                        <option value="line">Line</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block mb-2">Chọn loại</label>
                    <select class="border border-gray-300 p-2 w-full" name="reportType">
                        <option value="revenue">Doanh Thu</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block mb-2">Thời gian</label>

                    <!-- Chọn nhanh -->
                    <div class="flex items-center space-x-2">
                        <input type="radio" name="reportTimeMode" value="quick" id="quickSelect" class="mr-2">
                        <select id="quickSelectDropdown" class="border border-gray-300 p-2" name="reportTimeQuick">
                            <option value="yesterday">Hôm qua</option>
                            <option value="this_week">Tuần này</option>
                            <option value="this_month">Tháng này</option>
                            <option value="this_year">Năm này</option>
                        </select>
                    </div>

                    <!-- Chọn ngày cụ thể -->
                    <div class="flex items-center space-x-2 mt-2">
                        <input type="radio" name="reportTimeMode" value="custom" id="customDate" class="mr-2">
                        <input type="date" class="border border-gray-300 p-2" name="reportStartDate" id="startDate"
                               disabled>
                        <span>Đến</span>
                        <input type="date" class="border border-gray-300 p-2" name="reportEndDate" id="endDate"
                               disabled>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label class="block mb-2">So sánh với:</label>
                <!-- Chọn nhanh -->
                <div class="flex items-center space-x-2">
                    <input type="radio" name="reportCompareMode" value="quick" class="mr-2" id="quickSelect2">
                    <select id="quickSelectDropdown2" class="border border-gray-300 p-2" name="reportCompareQuick">
                        <option value="yesterday">Hôm qua</option>
                        <option value="this_week">Tuần này</option>
                        <option value="this_month">Tháng này</option>
                        <option value="this_year">Năm này</option>
                    </select>
                </div>

                <!-- Chọn ngày cụ thể -->
                <div class="flex items-center space-x-2 mt-2">
                    <input type="radio" name="reportCompareMode" value="custom" class="mr-2" id="customDate2">
                    <input type="date" class="border border-gray-300 p-2" name="reportCompareStartDate" id="startDate2"
                           disabled>
                    <span>Đến</span>
                    <input type="date" class="border border-gray-300 p-2" name="reportCompareEndDate" id="endDate2"
                           disabled>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="border border-gray-300 p-2">Xem</button>
            </div>
        </form>
        <!-- Form kết thúc -->
    </div>
</div>
</body>

<script>
    document.getElementById("quickSelect").addEventListener("change", function () {
        document.getElementById("quickSelectDropdown").disabled = false;
        document.getElementById("startDate").disabled = true;
        document.getElementById("endDate").disabled = true;
    });

    document.getElementById("customDate").addEventListener("change", function () {
        document.getElementById("quickSelectDropdown").disabled = true;
        document.getElementById("startDate").disabled = false;
        document.getElementById("endDate").disabled = false;
    });

    document.getElementById("quickSelect2").addEventListener("change", function () {
        document.getElementById("quickSelectDropdown2").disabled = false;
        document.getElementById("startDate2").disabled = true;
        document.getElementById("endDate2").disabled = true;
    });

    document.getElementById("customDate2").addEventListener("change", function () {
        document.getElementById("quickSelectDropdown2").disabled = true;
        document.getElementById("startDate2").disabled = false;
        document.getElementById("endDate2").disabled = false;
    });
</script>
</html>
