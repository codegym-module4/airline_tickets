<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Báo Cáo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body class="bg-gray-100 p-4">
<div class="max-w-4xl mx-auto bg-white border border-gray-300 p-4">
    <h1 class="text-center font-bold mb-4">Tạo Báo Cáo</h1>

    <!-- Form bắt đầu -->
    <form method="POST" action="/admin/create">
        <div class="border border-gray-300 p-4">
            <div class="mb-4">
                <label class="block mb-2">Chọn kiểu</label>
                <select class="border border-gray-300 p-2 w-full" name="reportContent">
                    <option value="pie">Circle</option>
                    <option value="bar">Bar</option>
                    <option value="line">Line</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block mb-2">Chọn loại</label>
                <select class="border border-gray-300 p-2 w-full" name="reportType">
                    <option value="revenue">Doanh Thu</option>
                    <option value="employee">Nhân viên</option>
                    <option value="airline">Hãng máy bay</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block mb-2">Thời gian</label>

                <!-- Chọn nhanh -->
                <div class="flex items-center space-x-2">
                    <input type="radio" name="reportTimeMode" value="quick" id="quickSelect" class="mr-2">
                    <select id="quickSelectDropdown" class="border border-gray-300 p-2" name="reportTimeQuick">
                        <option value="yesterday">Hôm qua</option>
                        <option value="this_week">Tuần này</option>
                        <option value="this_month">Tháng này</option>
                        <option value="this_year">Năm này</option>
                    </select>
                </div>

                <!-- Chọn ngày cụ thể -->
                <div class="flex items-center space-x-2 mt-2">
                    <input type="radio" name="reportTimeMode" value="custom" id="customDate" class="mr-2">
                    <input type="date" class="border border-gray-300 p-2" name="reportStartDate" id="startDate" disabled>
                    <span>Đến</span>
                    <input type="date" class="border border-gray-300 p-2" name="reportEndDate" id="endDate" disabled>
                </div>
            </div>
        </div>

        <div class="mb-4">
            <label class="block mb-2">So sánh với:</label>
            <!-- Chọn nhanh -->
            <div class="flex items-center space-x-2">
                <input type="radio" name="reportCompareMode" value="quick" class="mr-2" id="quickSelect2" >
                <select id="quickSelectDropdown2" class="border border-gray-300 p-2" name="reportCompareQuick">
                    <option value="yesterday">Hôm qua</option>
                    <option value="this_week">Tuần này</option>
                    <option value="this_month">Tháng này</option>
                    <option value="this_year">Năm này</option>
                </select>
            </div>

            <!-- Chọn ngày cụ thể -->
            <div class="flex items-center space-x-2 mt-2">
                <input type="radio" name="reportCompareMode" value="custom" class="mr-2" id="customDate2">
                <input type="date" class="border border-gray-300 p-2" name="reportCompareStartDate" id="startDate2" disabled>
                <span>Đến</span>
                <input type="date" class="border border-gray-300 p-2" name="reportCompareEndDate" id="endDate2" disabled>
            </div>
        </div>

        <div class="text-center">
            <button type="submit" class="border border-gray-300 p-2">Xem</button>
        </div>
    </form>
    <!-- Form kết thúc -->
</div>
</body>

<script>
    document.getElementById("quickSelect").addEventListener("change", function () {
        document.getElementById("quickSelectDropdown").disabled = false;
        document.getElementById("startDate").disabled = true;
        document.getElementById("endDate").disabled = true;
    });

    document.getElementById("customDate").addEventListener("change", function () {
        document.getElementById("quickSelectDropdown").disabled = true;
        document.getElementById("startDate").disabled = false;
        document.getElementById("endDate").disabled = false;
    });

    document.getElementById("quickSelect2").addEventListener("change", function () {
        document.getElementById("quickSelectDropdown2").disabled = false;
        document.getElementById("startDate2").disabled = true;
        document.getElementById("endDate2").disabled = true;
    });

    document.getElementById("customDate2").addEventListener("change", function () {
        document.getElementById("quickSelectDropdown2").disabled = true;
        document.getElementById("startDate2").disabled = false;
        document.getElementById("endDate2").disabled = false;
    });
</script>
</html>
