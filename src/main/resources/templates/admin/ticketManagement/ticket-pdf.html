<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: monospace;
      font-size: 12px;
      margin: 0;
      padding: 10px;
      background: white;
      width: 80mm;
      white-space: pre-wrap;
      color: #000;
    }

    .header {
      text-align: center;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .label {
      display: inline-block;
      width: 30%;
    }

    .value {
      display: inline-block;
      width: 68%;
    }

    .line {
      border-top: 1px dashed black;
      margin: 10px 0;
    }

    .footer {
      text-align: center;
      margin-top: 12px;
      font-weight: bold;
    }

    .section {
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

<div class="header">✈ VÉ MÁY BAY ĐIỆN TỬ ✈</div>
<div class="line"></div>


<div class="section">
  <div><span class="label">Mã vé</span>: <span class="value" th:text="${ticket.code}"></span></div>
  <div><span class="label">Hành khách</span>: <span class="value" th:text="${ticket.name}"></span></div>
  <div><span class="label">Giới tính</span>: <span class="value" th:text="${ticket.gender == 'Male' ? 'Nam' : (ticket.gender == 'Female' ? 'Nữ' : 'Khác')}"></span></div>
  <div><span class="label">Ngày sinh</span>: <span class="value" th:text="${#temporals.format(ticket.dob, 'dd/MM/yyyy')}"></span></div>
  <div><span class="label">CMND/CCCD</span>: <span class="value" th:text="${ticket.citizenIdentification}"></span></div>
  <div><span class="label">SĐT</span>: <span class="value" th:text="${ticket.phone}"></span></div>
</div>

<div class="section">
  <div><span class="label">Sân bay đi</span>: <span class="value" th:text="${ticket.flight.departureAirport.name}"></span></div>
  <div><span class="label">Sân bay đến</span>: <span class="value" th:text="${ticket.flight.arrivalAirport.name}"></span></div>
  <div><span class="label">Ngày bay</span>: <span class="value" th:text="${#temporals.format(ticket.flight.departure_time, 'dd/MM/yyyy HH:mm')}"></span></div>
  <div><span class="label">Giá vé</span>: <span class="value" th:text="${#numbers.formatDecimal(ticket.price, 0, 'POINT', 0, 'NONE')} + ' VND'"></span>
  </div>
</div>

<div class="line"></div>

<div class="footer">
  CẢM ƠN QUÝ KHÁCH<br>
  HẸN GẶP LẠI!
</div>

</body>
</html>
