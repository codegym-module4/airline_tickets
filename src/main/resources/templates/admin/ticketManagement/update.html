<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật vé</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .btn-red {
            background-color: #d9534f;
            color: white;
        }
        .btn-red:hover {
            background-color: #c9302c;
            color: white;
        }
    </style>
</head>
<body>

<div th:replace="~{admin/sidebar/sidebar :: adminSidebar}"></div>

<div class="container mt-5" style="margin-left: 260px;">
    <div class="card mx-auto shadow" style="max-width: 800px;">
        <div class="card-body">
            <h2 class="text-center text-danger mb-4">Cập nhật thông tin vé</h2>

            <form th:action="@{'/admin/ticketManagement/update/' + ${ticket.id}}" th:object="${ticket}" method="post" class="row g-3">
                <input type="hidden" th:field="*{id}"/>
                <input type="hidden" th:field="*{flight.id}" />


                <div class="col-md-6">
                    <label for="code" class="form-label">Mã vé</label>
                    <input type="text" th:field="*{code}" id="code" class="form-control" readonly>
                </div>

                <!-- Gửi booking id (nếu cập nhật được booking), nếu không có thì có thể giữ để reference -->
                <input type="hidden" th:name="booking.id" th:value="${ticket.booking != null ? ticket.booking.id : ''}"/>

                <div class="col-md-6">
                    <label for="bookingCode" class="form-label">Mã đặt chỗ</label>
                    <input type="text" id="bookingCode" th:value="${ticket.booking != null ? ticket.booking.code : ''}" class="form-control" readonly>
                </div>

                <div class="col-md-6">
                    <label for="name" class="form-label">Tên người đi</label>
                    <input type="text" th:field="*{name}" id="name" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label for="phone" class="form-label">Số điện thoại</label>
                    <input type="text" th:field="*{phone}" id="phone" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" th:field="*{email}" id="email" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label for="price" class="form-label">Giá vé</label>
                    <input type="number" th:field="*{price}" id="price" class="form-control" required min="0" step="1000">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Sân bay đi</label>
                    <input type="text" th:value="${ticket.flight != null ? ticket.flight.departureAirport.name : ''}" class="form-control" readonly>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Sân bay đến</label>
                    <input type="text" th:value="${ticket.flight != null ? ticket.flight.arrivalAirport.name : ''}" class="form-control" readonly>
                </div>

                <div class="col-12 text-center mt-4">
                    <button type="submit" class="btn btn-red"><i class="bi bi-save"></i> Cập nhật</button>
                    <a th:href="@{/admin/ticketManagement/list}" class="btn btn-secondary ms-2"><i class="bi bi-x-circle"></i> Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
