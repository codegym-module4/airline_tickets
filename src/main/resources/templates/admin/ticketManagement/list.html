<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý bán vé</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        .btn-red {
            background-color: #d9534f;
            color: white;
        }
        .btn-red:hover {
            background-color: #c9302c;
            color: white;
        }
        .btn-red-action {
            background-color: #d9534f;
            color: white;
            border: 1px solid #d9534f;
        }
        .btn-red-action:hover {
            background-color: white;
            color: #d9534f;
            border: 1px solid #d9534f;
        }
        .table thead {
            background-color: #d9534f;
            color: white;
        }
    </style>
</head>
<body>

<div th:replace="~{admin/sidebar/sidebar :: adminSidebar}"></div>

<div class="main-content container" style="margin-top: 60px;" id="mainContent">
    <h2 class="text-center text-danger mb-4">Quản lý bán vé</h2>

    <!-- Tìm kiếm -->
    <form th:action="@{/admin/ticketManagement/search}" method="get" class="row g-2 mb-4 align-items-end">
        <div class="col-md-3">
            <a th:href="@{/ticket/available}" class="btn btn-red w-100">Tìm vé trống</a>
        </div>
        <div class="col-md-3">
            <label for="field" class="form-label">Tìm theo</label>
            <select class="form-select" id="field" name="field">
                <option value="bookingCode">Mã đặt chỗ</option>
                <option value="name">Tên người đi</option>
                <option value="airport">Tuyến bay</option>
            </select>

        </div>
        <div class="col-md-4">
            <label for="value" class="form-label">Nội dung</label>
            <input type="text" id="value" class="form-control" name="value" placeholder="Nhập nội dung tìm kiếm" required>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-red w-100">Tìm</button>
        </div>
    </form>

    <!-- Bảng danh sách vé -->
    <table class="table table-bordered table-hover">
        <thead>
        <tr>
            <th>Mã vé</th>
            <th>Mã đặt chỗ</th>
            <th>Tên người đi</th>
            <th>Số điện thoại</th>
            <th>Email</th>
            <th>Sân bay đi</th>
            <th>Sân bay đến</th>
            <th>Giá vé</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ticket : ${ticketList}">
            <td th:text="${ticket.code}"></td>
            <td th:text="${ticket.booking != null ? ticket.booking.code : ''}"></td>
            <td th:text="${ticket.name}"></td>
            <td th:text="${ticket.phone}"></td>
            <td th:text="${ticket.email}"></td>
            <td th:text="${ticket.flight != null ? ticket.flight.departureAirport.name : ''}"></td>
            <td th:text="${ticket.flight != null ? ticket.flight.arrivalAirport.name : ''}"></td>
            <td th:text="${#numbers.formatDecimal(ticket.price, 0, 'COMMA', 2, 'POINT')} + ' VND'"></td>
            <td>
                <!-- Nút Sửa -->
                <a th:href="@{'/admin/ticketManagement/update/' + ${ticket.id}}"
                   class="btn btn-sm btn-warning me-2">
                    <i class="bi bi-pencil-square"></i>
                </a>

                <!-- Nút Xóa -->
                <a th:href="@{'/admin/ticketManagement/delete/' + ${ticket.id}}"
                   class="btn btn-sm btn-danger me-2"
                   onclick="return confirm('Bạn có chắc muốn xóa vé này?');">
                    <i class="bi bi-trash"></i>
                </a>

                <!-- Nút In vé -->
                <a th:href="@{'/admin/ticketManagement/print/' + ${ticket.id}}"
                   target="_blank"
                   class="btn btn-sm btn-success">
                    <i class="bi bi-printer"></i>
                </a>
            </td>

        </tr>
        <tr th:if="${ticketList.size() == 0}">
            <td colspan="9" class="text-center">Không tìm thấy vé nào.</td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
