<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Quản lý ghế ngồi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/admin/css/seat.css">
</head>
<body>
<!--Header-->
<div th:replace="~{admin/sidebar/sidebar :: adminSidebar}"></div>
<div class="main-content container" style="margin-top: 60px;" id="mainContent">
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <div class="row">
                    <div class="col-md-3 pe-0">
                        <!-- Legend -->
                        <div class="legend">
                            <div class="bg-danger p-3 w-100 text-center" style="border-top-left-radius: 12px; border-top-right-radius: 12px;">
                                <h5 class="text-white">Chú thích sơ đồ chỗ ngồi</h5>
                            </div>
                            <div class="d-flex align-items-center w-100">
                                <div class="seat seat-available"></div>
                                <span class="ps-2">Ghế trống</span>
                            </div>
                            <div class="d-flex align-items-center w-100">
                                <div class="seat seat-booked"></div>
                                <span class="ps-2">Đã đặt</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-9 ps-0">
                        <!-- Seat map -->
                        <div class="seat-map-container bg-secondary">
                            <div id="seat-map" class="bg-white mx-5">
                                <div th:each="row : ${#numbers.sequence(1, maxRow)}" class="seat-row pb-3">
                                    <!-- Duyệt qua từng cột từ A đến F -->
                                    <div th:each="col : ${cols}">

                                        <!-- Tìm ghế theo row và col -->
                                        <th:block th:with="seat=${seatMap.get(row) != null ? seatMap.get(row).get(col) : null}">

                                            <!-- Nếu có ghế -->
                                            <div th:if="${seat != null}"
                                                 th:class="'seat ' + (${seat.status == 2} ? 'seat-booked' : 'seat-available')"
                                                 th:id="'flight_seat_' + ${seat.id}"
                                                 th:data-id="${seat.id}">
                                                <span th:text="${seat.seatRow + seat.seatCol}"></span>
                                            </div>

                                            <!-- Nếu không có ghế: giữ chỗ -->
                                            <div th:if="${seat == null}" class="seat_not_found"></div>
                                        </th:block>
                                        <div th:if="${col == 'C'}" style="width: 150px;"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="/user/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/user/plugins/jquery/jquery.min.js"></script>
<script>

</script>
</body>

</html>
