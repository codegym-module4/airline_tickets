<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Chuyến bay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .table th {
            background-color: red;
            color: white;
        }
    </style>
</head>
<body>
<div th:replace="~{admin/sidebar/sidebar :: adminSidebar}"></div>


<div class="main-content container" style="margin-top: 60px;" id="mainContent">
    <h2 class="mb-4">Quản lý chuyến bay</h2>
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>


    <div class="d-flex justify-content-between mb-3">

        <div class="d-flex justify-content-between mb-3">
            <a th:href="@{/admin/flights/create}" class="btn btn-warning" style="background-color: red; color: white">
                Thêm Chuyến bay</a>
        </div>
        <form th:action="@{/admin/flights/search}" method="get" class="d-flex" style="gap: 10px;">
            <div class="col-auto">
                <select name="type" class="form-select">
                    <option value="code">Mã chuyến bay</option>
                    <option value="departure">Nơi đi</option>
                    <option value="arrival">Nơi đến</option>
                </select>
            </div>
            <div class="col-auto">
                <input type="text" name="keyword" class="form-control" placeholder="Nhập từ khóa...">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary">Tìm kiếm</button>
            </div>
        </form>


    </div>
    <table class="table table-bordered text-center">
        <thead>
        <tr>
            <th style="width: 5%">STT</th>
            <th>Mã</th>
            <th>Hãng</th>
            <th>Nơi đi</th>
            <th>Nơi đến</th>
            <th>Thời gian đi</th>
            <th>Thời gian đến</th>
            <th>Danh sách ghế</th>
            <th>Giá (VNĐ)</th>
            <th style="width: 10%">Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${flightList.isEmpty()}">
            <td colspan="5">Không tìm thấy dữ liệu</td>
        </tr>
        <tr th:each="flights, start : ${flightList}">
            <td th:text="${start.index + 1}"></td>
            <td th:text="${flights.code}"></td>
            <td th:text="${flights.airline.name}"></td>
            <td th:text="${flights.departureAirport.name}"></td>
            <td th:text="${flights.arrivalAirport.name}"></td>
            <td th:text="${#temporals.format(flights.departure_time, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${#temporals.format(flights.arrival_time, 'dd/MM/yyyy HH:mm')}"></td>
            <td>
                <a th:href="@{/admin/flight-seat/flight/{id}(id=${flights.id})}">
                    <span th:text="${totalSeatMap[flights.id]}"></span></a>
            </td>

            <td th:text="${flights.price}"></td>
            <td>
                <a th:href="@{/admin/flights/edit/{id}(id=${flights.id})}" class="btn btn-sm btn-warning me-2">
                    <i class="bi bi-pencil-square"></i>
                </a>
                <a th:href="@{/admin/flights/delete/{id}(id=${flights.id})}" class="btn btn-sm btn-danger"
                   onclick="return confirm('Bạn có chắc muốn xóa không?');">
                    <i class="bi bi-trash"></i>
                </a>
            </td>

        </tr>
        </tbody>
    </table>
</div>
<!-- Bootstrap JS & Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
