<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm chuyến bay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .container {
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div th:replace="~{admin/sidebar/sidebar :: adminSidebar}"></div>

<div class="main-content container" style="margin-top: 60px;" id="mainContent">
    <h4 class="text-center mb-4">THÊM CHUYẾN BAY</h4>
    <form th:action="@{/admin/flights/create}" th:object="${flights}" method="post" enctype="multipart/form-data">

        <div th:if="${errors != null}">
            <div class="alert alert-danger">
                <ul>
                    <li th:each="error : ${errors}" th:text="${error}"></li>
                </ul>
            </div>
        </div>


        <div class="row">
            <div class="mb-3">
                <label>Mã chuyến bay</label>
                <input type="text" th:field="*{code}" class="form-control" id="code" required>
                <div class="text-danger" th:if="${#fields.hasErrors('code')}" th:errors="*{code}"></div>
                <!-- Hiển thị lỗi trùng mã chuyến bay nếu có -->
                <div class="text-danger" th:if="${errorCodeExists != null}" th:text="${errorCodeExists}"></div>
            </div>


            <div class="mb-3">
                <label for="airline" class="form-label">Hãng hàng không</label>
                <select th:field="*{airline}" class="form-select" id="airline" required>
                    <!--        <option value="null">&#45;&#45; Chọn hãng &#45;&#45;</option>-->
                    <option th:each="airline : ${airlines}"
                            th:value="${airline.id}"
                            th:text="${airline.name}"></option>
                </select>
                <div class="text-danger" th:if="${#fields.hasErrors('airline')}" th:errors="*{airline}"></div>
            </div>

            <div class="mb-3">
                <label for="departureAirport" class="form-label">Nơi đi</label>
                <select th:field="*{departureAirport}" class="form-select" id="departureAirport" required>
                    <!--        <option value="null" selected>&#45;&#45; Chọn sân bay đi &#45;&#45;</option>-->
                    <option th:each="airport : ${airports}"
                            th:value="${airport.id}"
                            th:text="${airport.name}"></option>
                </select>
                <div class="text-danger" th:if="${#fields.hasErrors('departureAirport')}"
                     th:errors="*{departureAirport}"></div>
            </div>

            <div class="mb-3">
                <label for="arrivalAirport" class="form-label">Nơi đến</label>
                <select th:field="*{arrivalAirport}" class="form-select" id="arrivalAirport" required>
                    <!--        <option value="null">&#45;&#45; Chọn sân bay đến &#45;&#45;</option>-->
                    <option th:each="airport : ${airports}"
                            th:value="${airport.id}"
                            th:text="${airport.name}"></option>
                </select>
                <div class="text-danger" th:if="${#fields.hasErrors('arrivalAirport')}"
                     th:errors="*{arrivalAirport}"></div>

            </div>

            <div class="mb-3">
                <label for="departureTime" class="form-label">Thời gian đi</label>
                <input type="datetime-local" th:field="*{departure_time}" class="form-control" id="departureTime"
                       required>
                <div class="text-danger" th:if="${#fields.hasErrors('departure_time')}"
                     th:errors="*{departure_time}"></div>

            </div>

            <div class="mb-3">
                <label for="arrivalTime" class="form-label">Thời gian đến</label>
                <input type="datetime-local" th:field="*{arrival_time}" class="form-control" id="arrivalTime" required>
                <div class="text-danger" th:if="${#fields.hasErrors('arrival_time')}" th:errors="*{arrival_time}"></div>
            </div>

<!--            <div class="mb-3">-->
<!--                <label for="availableSeats" class="form-label">Số ghế sẵn có</label>-->
<!--                <input type="number" th:field="*{availableSeats}" class="form-control" id="availableSeats" min="0"-->
<!--                       required>-->

<!--            </div>-->

            <div class="mb-3">
                <label for="price" class="form-label">Giá vé (VNĐ)</label>
                <input type="number" th:field="*{price}" class="form-control" id="price" min="0" required>
                <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Thêm chuyến bay</button>
        <a th:href="@{/admin/flights}" class="btn btn-secondary">Quay lại</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
