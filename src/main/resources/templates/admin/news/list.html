<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tin tức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .table th {
            background-color: red;
            color: white;
        }
    </style>
</head>
<body>
<div th:replace="~{admin/sidebar/sidebar :: adminSidebar}"></div>

<!-- Nội dung chính -->
<div class="main-content container" style="margin-top: 60px;" id="mainContent">
    <h2 class="mb-4">Tin tức mới nhất</h2>
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>


    <div class="d-flex justify-content-between mb-3">

        <div class="d-flex justify-content-between mb-3">
            <a th:href="@{/admin/news/create}" class="btn btn-warning" style="background-color: red; color: white"> Thêm Tin tức</a>

        </div>
    </div>
    <table class="table table-bordered text-center">
        <thead>
        <tr>
            <th style="width: 5%">STT</th>
            <th>Tiêu đề</th>
            <th>Hình ảnh</th>
            <th>Nội dung</th>
            <th style="width: 10%">Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${newsList.isEmpty()}">
            <td colspan="5">Không tìm thấy dữ liệu</td>
        </tr>
        <tr th:each="news, iStat : ${newsList}">
            <td th:text="${iStat.index + 1}"></td>
            <td th:text="${news.title}">Tiêu đề</td>
            <td><img th:src="${news.imageURL}" th:alt="${news.title}"
                     style="width: 130px;height: 100px; object-fit: cover"></td>
            <td>
                <div>
                    <!-- Nội dung ngắn gọn -->
                    <span th:text="${#strings.abbreviate(news.content, 150)}"></span>
                    <button type="button" class="btn btn-link" data-bs-toggle="modal" style="text-decoration: none" data-bs-target="#newsModal"
                            th:attr="data-bs-title=${news.title}, data-bs-content=${news.content}, data-bs-image=${news.imageURL}">
                        Xem thêm
                    </button>
                </div>
            </td>
            <td>
                <a th:href="@{/admin/news/edit/{id}(id=${news.id})}" class="btn btn-sm btn-warning me-2"> <i class="bi bi-pencil-square"></i></a>
                <a th:href="@{/admin/news/delete/{id}(id=${news.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Bạn có chắc muốn xóa không?');"> <i class="bi bi-trash"></i></a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Modal chi tiết -->
    <div class="modal fade" id="newsModal" tabindex="-1" aria-labelledby="newsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg" >
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="newsModalLabel">Chi tiết tin tức</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Modal sẽ hiển thị title, nội dung và ảnh của tin tức -->
                    <h5 id="modalTitle" style="text-align: center"></h5>
                    <img id="modalImage" src="" alt="Ảnh tin tức" class="img-fluid mb-3 d-block mx-auto" style="max-height: 300px;">

                    <p id="modalContent"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS & Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let newsModal = document.getElementById('newsModal');
    newsModal.addEventListener('show.bs.modal', function (event) {
        let button = event.relatedTarget;

        let title = button.getAttribute('data-bs-title');
        let content = button.getAttribute('data-bs-content');
        let image = button.getAttribute('data-bs-image');

        let modalTitle = newsModal.querySelector('#modalTitle');
        let modalContent = newsModal.querySelector('#modalContent');
        let modalImage = newsModal.querySelector('#modalImage');

        modalTitle.textContent = title;
        modalContent.innerHTML = content.replace(/\n/g, "<br>");
        modalImage.src = image;
    });
</script>
