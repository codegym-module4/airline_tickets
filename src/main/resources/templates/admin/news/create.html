<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tin tức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .container {
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div th:replace="~{admin/sidebar/sidebar :: adminSidebar}"></div>

<div class="main-content container" style="margin-top: 60px;" id="mainContent">
    <h4 class="text-center mb-4">THÊM TIN TỨC</h4>
    <form th:action="@{/admin/news/create}" th:object="${news}" method="post">
        <div class="row">
            <div class="mb-3">
                <label>Tiêu đề</label>
                <input type="text" th:field="*{title}" placeholder="Tiêu đề" class="form-control form-control-lg"/>
                <div class="text-danger mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>

            <div class="mb-3">
                <label>Nội dung</label>
                <textarea th:field="*{content}" placeholder="Nội dung" class="form-control form-control-lg"
                          rows="5"></textarea>
                <div class="text-danger mt-1" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
            </div>

            <div class="mb-3 text-center">
                <input type="file" name="imageFile" class="form-control" onchange="previewImage(event)"/>
                <img id="previewImage" class="img-thumbnail mt-2 d-block mx-auto"
                     style="max-height: 200px; display: none;"/>
            </div>
        </div>
        <div class="btn-action mt-3 text-center">
            <a th:href="@{/admin/news}" class="btn">Quay lại</a>

            <button type="submit" class="btn btn-success">Lưu</button>
        </div>
    </form>
</div>
<script>
    function previewImage(event) {
        const img = document.getElementById('previewImage');
        img.src = URL.createObjectURL(event.target.files[0]);
        img.style.display = 'block';
    }

    document.querySelector('input[name="imageFile"]').addEventListener('change', previewImage);
</script>

</body>
</html>
