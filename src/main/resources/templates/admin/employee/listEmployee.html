<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản lý Nhân Viên</title>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/themes/smoothness/jquery-ui.min.css">
  <link rel="stylesheet" href="/admin/css/chat.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    .table th { background-color: red; color: white; }
    .btn-primary { background-color: red; border-color: red; }
    .btn-success { background-color: red; border-color: red; }
    .btn-danger { background-color: darkred; border-color: darkred; }
  </style>

</head>
<body>

<!-- Gọi sidebar -->
<div th:replace="~{admin/sidebar/sidebar :: adminSidebar}"></div>

<!-- Nội dung chính -->
<div class="main-content container" style="margin-top: 60px;" id="mainContent">
  <h2 class="mb-4">Quản lý Nhân Viên</h2>

  <div class="d-flex justify-content-between mb-3">
    <div class="d-flex gap-2">
      <a th:href="@{/admin/employee/createEmployee}" class="btn btn-success"> Thêm Nhân Viên</a>
    </div>

    <form th:action="@{/admin/employee/search}" method="get" class="d-flex" style="gap: 10px;">
      <select name="filter" class="form-select w-auto">
        <option value="id">Mã Nhân Viên</option>
        <option value="name">Họ Tên</option>
      </select>
      <input type="text" name="keyword" class="form-control w-50" placeholder="Tìm kiếm...">
      <button type="submit" class="btn btn-primary">Tìm</button>
    </form>
  </div>

  <th:block th:if="${#lists.isEmpty(employeeList)}">
    <p>Không có sản phẩm nào!</p>
  </th:block>

  <table class="table table-bordered text-center">
    <thead>
    <tr>
      <th>STT</th>
      <th>Mã Nhân Viên</th>
      <th>Họ Tên</th>
      <th>Ngày Sinh</th>
      <th>Giới Tính</th>
      <th>Số Điện Thoại</th>
      <th>Quê Quán</th>
      <th>Email</th>
      <th>Phân Quyền</th>
      <th>Thao Tác</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="employee, iStat : ${employeeList}">
      <td th:text="${iStat.index + 1}"></td>
      <td th:text="${employee.code}"></td>
      <td th:text="${employee.fullName}"></td>
      <td th:text="${#temporals.format(employee.dob, 'dd-MM-yyyy')}"></td>
      <td th:text="${employee.gender}"></td>
      <td th:text="${employee.phone}"></td>
      <td th:text="${employee.address}"></td>
      <td th:text="${employee.email}"></td>
      <td th:text="${employee.roleName}"></td>
      <td>
        <a th:href="@{'/admin/employee/updateEmployee'(id=${employee.employeeId})}"
           class="btn btn-sm btn-warning me-2">
          <i class="bi bi-pencil-square"></i>
        </a>

        <button th:if="${employee.roleName != 'ROLE_ADMIN'}"
                type="button"
                class="btn btn-sm btn-danger"
                data-bs-toggle="modal"
                data-bs-target="#confirmDeleteModal"
                th:attr="data-id=${employee.employeeId},
                     data-code=${employee.code},
                     data-name=${employee.fullName}">
          <i class="bi bi-trash"></i>
        </button>
      </td>

    </tr>

    </tbody>
  </table>
</div>

<!-- Modal xác nhận xóa -->
<div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-labelledby="confirmDeleteModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title" id="confirmDeleteModalLabel">Xác nhận xóa</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
      </div>
      <div class="modal-body">
        Bạn có chắc chắn muốn xóa nhân viên mã <strong id="employeeCodeText"></strong>, tên <strong id="employeeNameText"></strong>?
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
        <a id="confirmDeleteBtn" class="btn btn-danger">Xóa</a>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{admin/chat/employeeChat::chatBoxEmployee}"></th:block>

<!-- Bootstrap JS & Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script xử lý modal -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const deleteModal = document.getElementById('confirmDeleteModal');
    const employeeCodeText = document.getElementById('employeeCodeText');
    const employeeNameText = document.getElementById('employeeNameText');
    const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

    deleteModal.addEventListener('show.bs.modal', function (event) {
      const button = event.relatedTarget;
      const id = button.getAttribute('data-id');
      const code = button.getAttribute('data-code');
      const name = button.getAttribute('data-name');

      employeeCodeText.textContent = code;
      employeeNameText.textContent = name;
      confirmDeleteBtn.setAttribute('href', `/admin/employee/delete?id=${id}`);
    });
  });
</script>

<script src="/admin/js/employeeChat.js"></script>

</body>
</html>
