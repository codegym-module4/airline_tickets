<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản lý Nhân Viên</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .navbar { background-color: red; padding: 10px 20px; }
    .navbar-brand, .navbar .btn, .nav-link { color: white !important; }
    .table th { background-color: red; color: white; }
    .btn-primary { background-color: red; border-color: red; }
    .btn-danger { background-color: darkred; border-color: darkred; }
  </style>
</head>
<body>

<!-- Thanh điều hướng với menu -->
<nav class="navbar navbar-expand-lg">
  <a class="navbar-brand" href="#">Hệ Thống Quản Lý</a>
  <div class="collapse navbar-collapse">
    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
      <li class="nav-item">
        <a class="nav-link" th:href="@{/employees}">Nhân Viên</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:href="@{/flights}">Chuyến Bay</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:href="@{/tickets}">Vé Máy Bay</a>
      </li>
    </ul>
    <div class="d-flex">
      <button class="btn">Admin</button>
      <button class="btn">Đăng Xuất</button>
    </div>
  </div>
</nav>

<!-- Nội dung chính -->
<div class="container mt-4">
  <h2 class="mb-4">Quản lý Nhân Viên</h2>

  <!-- Hàng nút: Thêm mới + Xem Báo Cáo -->
  <div class="d-flex justify-content-between mb-3">
    <div class="d-flex gap-2">
      <a th:href="@{/employees/create}" class="btn btn-success">➕ Thêm Nhân Viên</a>
      <a th:href="@{/admin/report}" class="btn btn-primary">📊 Xem Báo Cáo</a>
    </div>

    <!-- Form Tìm kiếm -->
    <form th:action="@{/admin/employee/search}" method="get" class="d-flex" style="gap: 10px;">
      <select name="filter" class="form-select w-auto">
        <option value="id">Mã Nhân Viên</option>
        <option value="name">Họ Tên</option>
      </select>
      <input type="text" name="keyword" class="form-control w-50" placeholder="Tìm kiếm...">
      <button type="submit" class="btn btn-primary">Tìm</button>
    </form>
  </div>

  <!-- Bảng danh sách nhân viên -->
  <table class="table table-bordered text-center">
    <thead>
    <tr>
      <th>STT</th>
      <th>Mã Nhân Viên</th>
      <th>Họ Tên</th>
      <th>Ngày Sinh</th>
      <th>Giới Tính</th>
      <th>Số Điện Thoại</th>
      <th>Quê Quán</th>
      <th>Thao Tác</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="employee, iStat : ${employeeList}">
      <td th:text="${iStat.index + 1}"></td>
      <td th:text="${employee.code}"></td>
      <td th:text="${employee.fullName}"></td>
      <td th:text="${employee.dob}"></td>
      <td th:text="${employee.gender}"></td>
      <td th:text="${employee.phone}"></td>
      <td th:text="${employee.address}"></td>
      <td>
        <a th:href="@{'/employees/edit/' + ${employee.id}}" class="btn btn-primary btn-sm">Sửa</a>
        <a th:href="@{'/employees/delete/' + ${employee.id}}"
           class="btn btn-danger btn-sm"
           onclick="return confirm('Bạn có chắc chắn muốn xóa?');">
          Xóa
        </a>
      </td>
    </tr>
    </tbody>
  </table>
</div>

</body>
</html>
