<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật Nhân Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container {
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            margin-top: 30px;
        }
        .btn-action .btn {
            background-color: red;
            color: white;
            border: none;
        }
        .btn-action .btn:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div th:replace="~{admin/sidebar/sidebar :: adminSidebar}"></div>

<!-- Main Content -->
<div class="main-content container" id="mainContent">
    <h2 class="text-center">QUẢN LÝ NHÂN VIÊN</h2>
    <h4 class="text-center mb-4">CẬP NHẬT NHÂN VIÊN</h4>

    <form th:action="@{/admin/employee/updateEmployee}" th:object="${employeeAccountDTO}" method="post">
        <!-- Ẩn thông tin ID -->
        <input type="hidden" th:field="*{employeeId}" />
        <input type="hidden" th:field="*{accountId}" />
        <input type="hidden" th:field="*{roleId}" />

        <div class="row">
            <!-- Mã NV -->
            <div class="col-md-6 mb-3">
                <label for="code">Mã nhân viên</label>
                <input type="text" class="form-control" th:field="*{code}" id="code" readonly>
            </div>

            <!-- Họ tên -->
            <div class="col-md-6 mb-3">
                <label for="fullName">Họ tên</label>
                <input type="text" class="form-control" th:field="*{fullName}" id="fullName">
            </div>

            <!-- Ngày sinh -->
            <div class="col-md-6 mb-3">
                <label for="dob">Ngày sinh</label>
                <input type="date" class="form-control" th:field="*{dob}" id="dob">
            </div>

            <!-- Số điện thoại -->
            <div class="col-md-6 mb-3">
                <label for="phone">Số điện thoại</label>
                <input type="text" class="form-control" th:field="*{phone}" id="phone">
            </div>

            <!-- Giới tính -->
            <div class="col-md-6 mb-3">
                <label for="gender">Giới tính</label>
                <select class="form-control" th:field="*{gender}" id="gender">
                    <option value="Male">Nam</option>
                    <option value="Female">Nữ</option>
                    <option value="Other">Khác</option>
                </select>
            </div>

            <!-- Địa chỉ -->
            <div class="col-md-6 mb-3">
                <label for="address">Địa chỉ</label>
                <input type="text" class="form-control" th:field="*{address}" id="address">
            </div>

            <!-- Email -->
            <div class="col-md-6 mb-3">
                <label for="email">Email</label>
                <input type="email" class="form-control" th:field="*{email}" id="email">
            </div>

            <!-- Mật khẩu -->
            <div class="col-md-6 mb-3">
                <label for="password">Mật khẩu (nếu cần đổi)</label>
                <input type="password" class="form-control" th:field="*{password}" id="password">
            </div>

            <!-- Vai trò -->
            <div class="col-md-6 mb-3">
                <label for="role">Vai trò</label>
                <input type="text" class="form-control" th:value="${employeeAccountDTO.roleName}" id="role" readonly>
            </div>
        </div>

        <!-- Nút hành động -->
        <div class="btn-action mt-4 text-center">
            <a th:href="@{/admin/employee/listEmployee}" class="btn">Quay lại</a>
            <button type="submit" class="btn">Cập nhật</button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
