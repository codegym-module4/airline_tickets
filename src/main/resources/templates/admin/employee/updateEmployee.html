<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa Nhân Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background-color: red;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }
        .navbar-brand {
            color: white !important;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }
        .navbar .btn {
            color: white !important;
            background: none;
            border: none;
            font-size: 16px;
        }
        .navbar .btn:hover {
            text-decoration: underline;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .container {
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .btn-action {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .btn-action .btn {
            background-color: red;
            border: none;
            color: white;
        }
        .btn-action .btn:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>
<!--sidebar-->
<div th:replace="admin/sidebar/sidebar :: adminSidebar"></div>

<div class="main-content container" style="margin-top: 60px;" id="mainContent">
    <h2 class="text-center">Sửa thông tin nhân viên</h2>
    <form th:action="@{/admin/employee/updateEmployee}" method="post" th:object="${employee}">
        <input type="hidden" th:field="*{id}" />

        <div class="row">
            <div class="col-md-6 form-group">
                <label>Mã Nhân Viên</label>
                <input type="text" class="form-control" th:field="*{code}" readonly>
            </div>

            <div class="col-md-6 form-group">
                <label>Họ Tên</label>
                <input type="text" class="form-control" th:field="*{fullName}">
            </div>
            <div class="col-md-6 form-group">
                <label>Ngày sinh</label>
                <input type="date" class="form-control" th:field="*{dob}">
            </div>
            <div class="col-md-6 form-group">
                <label>Số điện thoại</label>
                <input type="text" class="form-control" th:field="*{phone}">
            </div>
            <div class="col-md-6 form-group">
                <label>Giới tính</label>
                <select class="form-control" th:field="*{gender}">
                    <option value="Male" th:selected="*{gender == 'Male'}">Nam</option>
                    <option value="Female" th:selected="*{gender == 'Female'}">Nữ</option>
                    <option value="Other" th:selected="*{gender == 'Other'}">Khác</option>
                </select>
            </div>
            <div class="col-md-6 form-group">
                <label>Quê Quán</label>
                <input type="text" class="form-control" th:field="*{address}">
            </div>
        </div>
        <div class="btn-action mt-3">
            <button type="button" class="btn" onclick="window.history.back()">Quay lại</button>
            <button type="submit" class="btn">Xác nhận</button>
        </div>
    </form>
</div>
</body>
</html>
