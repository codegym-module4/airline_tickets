<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật Nhân Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container {
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        .btn-action .btn {
            background-color: red;
            color: white;
            border: none;
        }
        .btn-action .btn:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div th:replace="admin/sidebar/sidebar :: adminSidebar"></div>

<!-- Main Content -->
<div class="main-content container" id="mainContent">
    <h2 class="text-center">QUẢN LÝ NHÂN VIÊN</h2>
    <h4 class="text-center mb-4">CẬP NHẬT NHÂN VIÊN</h4>

    <form th:action="@{/admin/employee/updateEmployee}" th:object="${employeeAccountDTO}" method="post">
        <input type="hidden" th:field="*{employeeId}"/>

        <div class="row">
            <div class="col-md-6 form-group mb-3">
                <label>Mã nhân viên</label>
                <input type="text" class="form-control" th:field="*{code}" readonly>
            </div>

            <div class="col-md-6 form-group">
                <label>Họ tên</label>
                <input type="text" class="form-control" th:field="*{fullName}" th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{fullName}"></div>
            </div>

            <div class="col-md-6 form-group">
                <label>Ngày sinh</label>
                <input type="date" class="form-control" th:field="*{dob}" th:classappend="${#fields.hasErrors('dob')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{dob}"></div>
            </div>
            <div class="col-md-6 form-group">
                <label th:for="phone" class="form-label">Số điện thoại</label>
                <input type="text" class="form-control" th:field="*{phone}"
                       th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{phone}"></div>
            </div>
            <div class="col-md-6 form-group">
                <label>Giới tính</label>
                <select class="form-control" th:field="*{gender}">
                    <option value="Male" th:selected="*{gender == 'Male'}">Nam</option>
                    <option value="Female" th:selected="*{gender == 'Female'}">Nữ</option>
                    <option value="Other" th:selected="*{gender == 'Other'}">Khác</option>
                </select>

            </div>
            <div class="col-md-6 form-group">
                <label>Quê Quán</label>
                <input type="text" class="form-control" th:field="*{address}" th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{address}"></div>
            </div>
        </div>

        <!-- Tài khoản -->
        <div class="row mt-4">
            <div class="col-md-6 form-group">
                <label>Email</label>
                <input type="email" class="form-control" th:field="*{email}" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{email}"></div>
                <div class="text-danger" th:if="${errorEmailExists != null}" th:text="${errorEmailExists}"></div>

            </div>

            <div class="col-md-6 form-group">
                <label>Mật khẩu</label>
                <p>Nhấn "Reset mật khẩu" để đặt lại về mặc định.</p>
                <input type="hidden" id="resetPassword" name="resetPassword" value="false">
                <button type="button" class="btn btn-warning" onclick="resetPassword()">Reset mật khẩu</button>
            </div>

            <div class="col-md-6 form-group mb-3">
                <label>Vai trò</label>
                <input type="text" class="form-control" th:value="${employeeAccountDTO.roleName}" readonly>
                <input type="hidden" th:field="*{roleId}" />
            </div>
        </div>

        <div class="btn-action mt-4 text-center">
            <a th:href="@{/admin/employee/listEmployee}" class="btn">Quay lại</a>
            <button type="submit" class="btn">Cập nhật</button>
        </div>
    </form>
</div>
<script>
    function resetPassword() {
        if (confirm("Bạn có chắc muốn đặt lại mật khẩu nhân viên về mặc định?")) {
            document.getElementById('resetPassword').value = 'true';
            alert("Mật khẩu sẽ được đặt lại khi bạn nhấn 'Cập nhật'");
        }
    }
</script>
</body>
</html>
