<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật Nhân Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container {
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        .btn-action .btn {
            background-color: red;
            color: white;
            border: none;
        }
        .btn-action .btn:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div th:replace="admin/sidebar/sidebar :: adminSidebar"></div>

<!-- Main Content -->
<div class="main-content container" id="mainContent">
    <h2 class="text-center">QUẢN LÝ NHÂN VIÊN</h2>
    <h4 class="text-center mb-4">CẬP NHẬT NHÂN VIÊN</h4>

    <form th:action="@{/admin/employee/updateEmployee}" th:object="${employeeAccountDTO}" method="post">
        <input type="hidden" th:field="*{employeeId}"/>

        <div class="row">
            <div class="col-md-6 form-group mb-3">
                <label>Mã nhân viên</label>
                <input type="text" class="form-control" th:field="*{code}" readonly>
            </div>

            <div class="col-md-6 form-group mb-3">
                <label>Họ tên</label>
                <input type="text" class="form-control" th:field="*{fullName}">
            </div>

            <div class="col-md-6 form-group mb-3">
                <label>Ngày sinh</label>
                <input type="date" class="form-control" th:field="*{dob}">
            </div>

            <div class="col-md-6 form-group mb-3">
                <label>Số điện thoại</label>
                <input type="text" class="form-control" th:field="*{phone}">
            </div>

            <div class="col-md-6 form-group mb-3">
                <label>Giới tính</label>
                <select class="form-control" th:field="*{gender}">
                    <option value="Male">Nam</option>
                    <option value="Female">Nữ</option>
                    <option value="Other">Khác</option>
                </select>
            </div>

            <div class="col-md-6 form-group mb-3">
                <label>Quê quán</label>
                <input type="text" class="form-control" th:field="*{address}">
            </div>
        </div>

        <!-- Tài khoản -->
        <div class="row mt-3">
            <div class="col-md-6 form-group mb-3">
                <label>Email</label>
                <input type="email" class="form-control" th:field="*{email}">
            </div>

            <div class="col-md-6 form-group mb-3">
                <label>Mật khẩu (nếu cần đổi)</label>
                <input type="password" class="form-control" th:field="*{password}">
            </div>

            <div class="col-md-6 form-group mb-3">
                <label>Vai trò</label>
                <input type="text" class="form-control" th:value="${employeeAccountDTO.roleName}" readonly>
                <input type="hidden" th:field="*{roleId}" />
            </div>
        </div>

        <div class="btn-action mt-4 text-center">
            <a th:href="@{/admin/employee/listEmployee}" class="btn">Quay lại</a>
            <button type="submit" class="btn">Cập nhật</button>
        </div>
    </form>
</div>

</body>
</html>
