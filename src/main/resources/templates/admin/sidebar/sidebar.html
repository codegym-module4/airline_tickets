<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!-- sidebar.html -->
<div th:fragment="adminSidebar">

    <!-- CSS tích hợp -->
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        /* Navbar top */
        .navbar-admin {
            background-color: #dc3545;
            color: white;
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .navbar-admin h5 {
            margin: 0;
            font-weight: bold;
        }

        .navbar-admin .right-menu button {
            margin-left: 1rem;
        }

        .menu-button {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            top: 0;
            left: -250px;
            background-color: #f8f9fa; /* nền xám nhẹ */
            color: #dc3545;
            padding-top: 60px;
            transition: 0.3s;
            z-index: 999;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .sidebar a {
            padding: 12px 20px;
            display: block;
            background-color: white; /* nền trắng */
            color: #dc3545; /* chữ đỏ */
            text-decoration: none;
            border: 1px solid #ccc; /* viền đen mỏng */
            border-radius: 5px;
            margin: 10px 15px;
            transition: all 0.2s ease-in-out;
        }

        .sidebar a:hover {
            background-color: #dc3545; /* nền đỏ */
            color: white; /* chữ trắng */
            border: 1px solid #dc3545; /* viền đỏ đậm */
        }

        .sidebar.open {
            left: 0;
        }

        .main-content {
            margin-top: 60px;
            padding: 1rem;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .main-content.with-sidebar {
            transform: scale(0.95) translateX(120px);
            filter: brightness(0.9);
        }
    </style>

    <!-- Navbar -->
    <div class="navbar-admin fixed-top">
        <div class="left-menu d-flex align-items-center">
            <button class="menu-button" onclick="toggleSidebar()">☰</button>
            <h5 class="ms-3 mb-0">Hệ thống quản lý phòng bán vé máy bay</h5>
        </div>
        <div class="right-menu">
            <button class="btn btn-light text-dark">Admin</button>
            <button class="btn btn-outline-light">Đăng xuất</button>
        </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <a href="/admin/employee/listEmployee">Quản lý Nhân viên</a>
        <a href="/admin/flight/list">Quản lý Chuyến bay</a>
        <a href="/admin/ticket/list">Quản lý Vé</a>
        <a href="/admin/customer/list">Quản lý Khách hàng</a>
        <a href="/admin/news">Quản lý tin tức</a>
        <a href="/admin/report">Báo cáo</a>
    </div>


    <!-- JavaScript điều khiển sidebar -->
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');

            sidebar.classList.toggle('open');
            if (sidebar.classList.contains('open')) {
                mainContent.classList.add('with-sidebar');
            } else {
                mainContent.classList.remove('with-sidebar');
            }
        }
    </script>
</div>

</body>
</html>
