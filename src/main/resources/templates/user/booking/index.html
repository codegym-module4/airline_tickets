<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/html">
<head th:replace="~{user/layouts/head::head ('Thanh toán')}"></head>
<body>
<!--Header-->
<th:block th:replace="~{user/layouts/header::header}"></th:block>
<div class="main-content">
    <form action="/confirm" method="post">
        <div class="container mt-4 p-4 border rounded bg-light">
            <div class="mb-3">
                <h4>Người lớn </h4>
            </div>
            <div class="row mb-3">
                <div class="col-md-6 d-flex align-items-center">
                    <label for="name1" class="mb-0" style="display: inline-block; width: 30%">Họ và Tên: </label>
                    <input type="text" id="name1" name="name1" class="form-control"
                           style="display: inline-block; width: 70%">
                </div>

                <div class="col-md-6 d-flex align-items-center">
                    <label for="luggage1" class="mb-0" style="display: inline-block; width: 30%">Hành lý kí
                        gửi: </label>
                    <select id="luggage1" name="luggage1" class="form-select"
                            style="display: inline-block; width: 70%">
                        <option value="15">Mua thêm 15kg - 150.000 VNĐ</option>
                        <option value="25">Mua thêm 25kg - 250.000 VNĐ</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6 d-flex align-items-center">
                    <label for="date2" class="mb-0" style="display: inline-block; width: 30%">Ngày sinh</label>
                    <input type="date" id="date2" class="form-control" style="display: inline-block; width: 70%">
                </div>
                <div class="col-md-6 d-flex align-items-center">
                    <label for="date2" class="mb-0" style="display: inline-block; width: 30%">Quốc gia</label>
                    <select id="nationality" name="nationality" class="form-select"
                            style="display: inline-block; width: 70%">
                        <option value="">-- Chọn quốc gia --</option>
                        <th:block th:each="country : ${countries}">
                            <option th:value="${country.niceName}" th:text="${country.niceName}"></option>
                        </th:block>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6 d-flex align-items-center">
                    <label for="gender1" class="mb-0" style="display: inline-block; width: 30%">Giới tính:</label>
                    <select id="gender1" name="gender1" class="form-select"
                            style="display: inline-block; width: 70%">
                        <option value="Male">Nam</option>
                        <option value="Female">Nữ</option>
                        <option value="Other">Khác</option>
                    </select>
                </div>
                <div class="col-md-6 d-flex align-items-center">
                    <label for="email1" class="mb-0" style="display: inline-block; width: 30%">Email:</label>
                    <input type="email" id="email1" name="email1" class="form-control"
                           style="display: inline-block; width: 70%" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6 d-flex align-items-center">
                    <label for="phone1" class="mb-0" style="display: inline-block; width: 30%">Điện thoại:</label>
                    <input type="text" id="phone1" name="phone1" class="form-control"
                           style="display: inline-block; width: 70%" required>
                </div>
                <div class="col-md-6 d-flex align-items-center">
                    <label for="citizen_identification1" class="mb-0" style="display: inline-block; width: 30%">CMND/Passport:</label>
                    <input type="text" id="citizen_identification1" name="citizen_identification1"
                           class="form-control" style="display: inline-block; width: 70%"
                           required>
                </div>
            </div>

        </div>


        <div class="container mt-4 p-4 border rounded bg-light">
            <div class="mb-3">
                <h4>Trẻ em </h4>
            </div>
            <div class="row mb-3">
                <div class="col-md-6 d-flex align-items-center">
                    <label for="name2" class="mb-0" style="display: inline-block; width: 30%">Họ và Tên: </label>
                    <input type="text" id="name2" name="name2" class="form-control"
                           style="display: inline-block; width: 70%">
                </div>
                <div class="col-md-6 d-flex align-items-center">
                    <label for="gender2" class="mb-0" style="display: inline-block; width: 30%">Giới tính:</label>
                    <select id="gender2" name="gender2" class="form-select"
                            style="display: inline-block; width: 70%">
                        <option value="Male">Nam</option>
                        <option value="Female">Nữ</option>
                        <option value="Other">Khác</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6 d-flex align-items-center">
                    <label for="date2" class="mb-0" style="display: inline-block; width: 30%">Ngày sinh</label>
                    <input type="date" id="date4" class="form-control" style="display: inline-block; width: 70%">
                </div>
            </div>

        </div>


        <div class="container mt-4 p-4 border rounded bg-light">
            <div class="mb-3">
                <h4>Em bé </h4>
            </div>
            <div class="row mb-3">
                <div class="col-md-6 d-flex align-items-center">
                    <label for="name3" class="mb-0" style="display: inline-block; width: 30%">Họ và Tên: </label>
                    <input type="text" id="name3" name="name3" class="form-control"
                           style="display: inline-block; width: 70%">
                </div>
                <div class="col-md-6 d-flex align-items-center">
                    <label for="gender3" class="mb-0" style="display: inline-block; width: 30%">Giới tính:</label>
                    <select id="gender3" name="gender3" class="form-select"
                            style="display: inline-block; width: 70%">
                        <option value="Male">Nam</option>
                        <option value="Female">Nữ</option>
                        <option value="Other">Khác</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6 d-flex align-items-center">
                    <label for="date" class="mb-0" style="display: inline-block; width: 30%">Ngày sinh</label>
                    <input type="date" id="date" class="form-control" style="display: inline-block; width: 70%">
                </div>
            </div>

        </div>
        <div class="container mt-4 d-flex justify-content-between">
            <a href="/views/flight_list.html" class="btn btn-outline-secondary" style="width: 15%">Chọn lại chuyến bay</a>
            <button type="submit" class="btn btn-custom mx-auto" style="width: 15%">Đặt vé</button>
        </div>
    </form>
</div>
<th:block th:insert="~{user/layouts/modal_success::modalSuccess}"></th:block>
<th:block th:replace="~{user/layouts/footer::footer}"></th:block>
<th:block th:replace="~{user/layouts/script::script}"></th:block>
</body>

</html>
