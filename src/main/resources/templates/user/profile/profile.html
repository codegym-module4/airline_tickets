<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{user/layouts/head::head('Hồ sơ - Vietjet Air')}"></head>
<body style="background: white; background-size: cover;">
<th:block th:replace="~{user/layouts/header::header}"></th:block>
<main id="content">
    <section class="section">
        <div class="mypage_block user_info">

            <!-- Nav gốc giữ y nguyên -->
            <nav class="mypage_nav">
                <ul>
                    <li class="user_info"><a href="/profile" th:text="#{user_infor}">Thông tin cá nhân</a></li>
                    <li class="user_ticket"><a href="/my-ticket" th:text="#{my_ticket}">Đặt chỗ của tôi</a></li>
                    <li class="user_payment"><a href="/payment" th:text="#{payment}">Thanh toán</a></li>
                    <li class="user_transfer_history"><a href="/payment/transfer-history" th:text="#{transaction_history}">Lịch sử giao dịch</a></li>
                    <li class="user_change_password"><a th:href="@{/profile/change-password}" th:text="#{change_password}">Đổi mật khẩu</a></li>
                </ul>
            </nav>

            <!-- Content mới -->
            <div class="col-lg-9">
                <div class="card shadow-sm rounded-3">
                    <div class="card-header bg-danger text-white">
                        <h4 class="mb-0" th:text="#{profile}">Hồ sơ người dùng</h4>
                    </div>
                    <div class="card-body">
                        <div sec:authorize="isAuthenticated()">

                            <!-- Avatar -->
                            <div class="text-center mb-4">
                                <img th:if="${user.image != null}" th:src="${user.image}"
                                     class="rounded-circle border"
                                     style="width:120px; height:120px; object-fit:cover;"
                                     alt="Ảnh đại diện"/>
                                <img th:if="${user.image == null}" src="/user/img/default-avatar.png"
                                     class="rounded-circle border"
                                     style="width:120px; height:120px; object-fit:cover;"
                                     alt="Ảnh mặc định"/>
                            </div>

                            <!-- Thông tin dưới dạng form-floating disabled -->
                            <div class="row gx-3">
                                <div class="col-md-6 mb-3">
                                    <div class="form-floating">
                                        <input type="text" id="fullName" class="form-control" placeholder="Họ và tên"
                                               th:value="${#authentication.principal.fullName}" disabled/>
                                        <label for="fullName" th:text="#{full_name}">Họ và tên</label>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <div class="form-floating">
                                        <input type="email" id="email" class="form-control" placeholder="Email"
                                               th:value="${#authentication.name}" disabled/>
                                        <label for="email" th:text="#{email}">Email</label>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <div class="form-floating">
                                        <input type="text" id="dob" class="form-control" placeholder="Ngày sinh"
                                               th:value="${#temporals.format(user.dob,'dd/MM/yyyy')}" disabled/>
                                        <label for="dob" th:text="#{dob}">Ngày sinh</label>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <div class="form-floating">
                                        <input type="text" id="gender" class="form-control" placeholder="Giới tính"
                                               th:value="${user.gender}" disabled/>
                                        <label for="gender" th:text="#{gender}">Giới tính</label>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <div class="form-floating">
                                        <input type="text" id="phone" class="form-control" placeholder="Số điện thoại"
                                               th:value="${user.phone}" disabled/>
                                        <label for="phone" th:text="#{phone_number}">Số điện thoại</label>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <div class="form-floating">
                                        <input type="text" id="citizenIdentification" class="form-control" placeholder="CCCD"
                                               th:value="${user.citizenIdentification}" disabled/>
                                        <label for="citizenIdentification" th:text="#{id_card}">CCCD</label>
                                    </div>
                                </div>
                                <div class="col-12 mb-3">
                                    <div class="form-floating">
                                        <input type="text" id="address" class="form-control" placeholder="Địa chỉ"
                                               th:value="${user.address}" disabled/>
                                        <label for="address" th:text="#{address_cus}">Địa chỉ</label>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <div class="form-floating">
                                        <input type="text" id="nationality" class="form-control" placeholder="Quốc tịch"
                                               th:value="${user.nationality}" disabled/>
                                        <label for="nationality" th:text="#{nationality}">Quốc tịch</label>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <div class="form-floating">
                                        <input type="text" id="ranking" class="form-control" placeholder="Xếp hạng"
                                               th:value="${user.ranking}" disabled/>
                                        <label for="ranking" th:text="#{ranking}">Xếp hạng</label>
                                    </div>
                                </div>
                            </div>

                            <!-- Nút chỉnh sửa -->
                            <div class="d-flex justify-content-end mt-4">
                                <a th:href="@{/profile/edit}" class="btn btn-custom" th:text="#{change}">Chỉnh sửa</a>
                                <a th:href="@{/profile/delete-account}" class="btn btn-outline-danger ms-2" th:text="#{delete_account}">Xóa tài khoản</a>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
            <!-- End content mới -->

        </div><!-- .mypage_block END -->
    </section>
    <th:block th:replace="~{user/layouts/footer::footer}"></th:block>
</main>
<th:block th:replace="~{user/layouts/script::script}"></th:block>
</body>
</html>
