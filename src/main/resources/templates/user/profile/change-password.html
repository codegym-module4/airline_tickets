<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{user/layouts/head::head('Đổi mật khẩu - Vietjet Air')}"></head>
<body style="background: url('/user/img/background-main.jpg'); background-size: cover;">
    <th:block th:replace="~{user/layouts/header::header}"></th:block>
    <main id="content">
        <section class="section">
            <div class="mypage_block user_change_password">
                <nav class="mypage_nav">
                    <ul>
                        <li class="user_info"><a href="/profile">Thông tin cá nhân</a></li>
                        <li class="user_payment"><a href="/payment">Thanh toán</a></li>
                        <li class="user_transfer_history"><a href="/payment/transfer-history">Lịch sử giao dịch</a></li>
                        <li class="user_change_password"><a href="#">Đổi mật khẩu</a></li>
                    </ul>
                </nav>
                <section class="mypage_content">
                    <div class="booking-form" style="max-width: 400px; padding: 20px; border-radius: 5px;">
                        <h2 class="text-white text-center">Đổi mật khẩu</h2>
                        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <form th:action="@{/profile/change-password}" th:object="${passwordForm}" method="post" class="mt-3">
                            <div class="mb-3">
                                <label for="oldPassword" class="form-label text-white">Mật khẩu cũ:</label>
                                <input type="password" id="oldPassword" th:field="*{oldPassword}" class="form-control" required/>
                            </div>
                            <div class="mb-3">
                                <label for="newPassword" class="form-label text-white">Mật khẩu mới:</label>
                                <input type="password" id="newPassword" th:field="*{newPassword}" class="form-control" required minlength="6"/>
                            </div>
                            <button type="submit" class="btn btn-custom w-100">Xác nhận</button>
                        </form>
                    </div>
                </section>
            </div><!-- .mypage_block END -->
        </section>
        <th:block th:replace="~{user/layouts/footer::footer}"></th:block>
    </main>
    <th:block th:replace="~{user/layouts/script::script}"></th:block>
</body>
</html>
