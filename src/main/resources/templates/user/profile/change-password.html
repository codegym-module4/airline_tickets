<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{user/layouts/head::head('Đổi mật khẩu - Vietjet Air')}"></head>
<body style="background: white; background-size: cover;">
    <th:block th:replace="~{user/layouts/header::header}"></th:block>
    <main id="content">
        <section class="section">
            <div class="mypage_block user_change_password">
                <nav class="mypage_nav">
                    <ul>
                        <li class="user_info"><a href="/profile" th:text="#{user_infor}">Thông tin cá nhân</a></li>
                        <li class="user_ticket"><a href="/my-ticket" th:text="#{my_ticket}">Đặt chỗ của tôi</a></li>
                        <li class="user_payment"><a href="/payment" th:text="#{payment}">Thanh toán</a></li>
                        <li class="user_transfer_history"><a href="/payment/transfer-history" th:text="#{transaction_history}">Lịch sử giao dịch</a></li>
                        <li class="user_change_password"><a href="#" th:text="#{change_password}">Đổi mật khẩu</a></li>
                    </ul>
                </nav>
                <section class="mypage_content">
                    <div class="booking-form" style="max-width: 400px; padding: 20px; border-radius: 5px;">
                        <h2 class="text-white text-center" th:text="#{change_password}">Đổi mật khẩu</h2>
                        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <form th:action="@{/profile/change-password}" th:object="${passwordForm}" method="post" class="mt-3">
                            <div class="mb-3">
                                <label for="oldPassword" class="form-label text-white" th:text="#{old_password}">Mật khẩu cũ:</label>
                                <input type="password" id="oldPassword" th:field="*{oldPassword}" class="form-control" required/>
                            </div>
                            <div class="mb-3">
                                <label for="newPassword" class="form-label text-white" th:text="#{new_password}">Mật khẩu mới:</label>
                                <input type="password" id="newPassword" th:field="*{newPassword}" class="form-control" required minlength="6"/>
                            </div>
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label text-white" th:text="#{enter_password}">Xác nhận mật khẩu mới:</label>
                                <input type="password" id="confirmPassword" class="form-control" required minlength="6"/>
                            </div>
                            <button type="submit" class="btn btn-custom w-100" th:text="#{confirm}">Xác nhận</button>
                        </form>
                    </div>
                </section>
            </div><!-- .mypage_block END -->
        </section>
        <th:block th:replace="~{user/layouts/footer::footer}"></th:block>
    </main>
    <th:block th:replace="~{user/layouts/script::script}"></th:block>
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            if (document.getElementById('newPassword').value
                !== document.getElementById('confirmPassword').value) {
                e.preventDefault();
                alert('Mật khẩu mới và xác nhận mật khẩu không khớp!');
            }
        });
    </script>
</body>
</html>
