<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{user/layouts/head::head('Chỉnh sửa hồ sơ - Vietjet Air')}"></head>
<body style="background: white; background-size: cover;">
<th:block th:replace="~{user/layouts/header::header}"></th:block>
<main id="content">
    <section class="section">
        <div class="mypage_block user_info">
            <nav class="mypage_nav">
                <ul>
                    <li class="user_info"><a href="/profile" th:text="#{user_infor}">Thông tin cá nhân</a></li>
                    <li class="user_ticket"><a href="/my-ticket" th:text="#{my_ticket}">Đặt chỗ của tôi</a></li>
                    <li class="user_payment"><a href="/payment" th:text="#{payment}">Thanh toán</a></li>
                    <li class="user_transfer_history"><a href="/payment/transfer-history" th:text="#{transaction_history}">Lịch sử giao dịch</a></li>
                    <li class="user_change_password"><a href="/profile/change-password" th:text="#{change_password}">Đổi mật khẩu</a></li>
                </ul>
            </nav>
            <!-- Edit profile form -->
            <div class="col-lg-9">
                <div class="card shadow-sm rounded-3">
                    <div class="card-header bg-danger text-white">
                        <h4 class="mb-0" th:text="#{change_profile}">Chỉnh sửa hồ sơ</h4>
                    </div>
                    <div class="card-body">
                        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                        <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

                        <form th:action="@{/profile/edit}" th:object="${user}"
                              method="post" enctype="multipart/form-data">
                            <div class="row gx-3">

                                <!-- Avatar preview + upload -->
                                <div class="col-12 text-center mb-4">
                                    <div class="position-relative d-inline-block">
                                        <img th:src="${user.image}"
                                             class="rounded-circle border"
                                             style="width:120px; height:120px; object-fit:cover;"
                                             alt="Avatar"/>
                                        <label for="profileImage"
                                               class="btn btn-sm btn-secondary position-absolute"
                                               style="bottom:0; right:0; transform:translate(25%,25%);">
                                            <i class="bi bi-camera">Upload</i>
                                        </label>
                                    </div>
                                    <input type="file" id="profileImage" name="profileImage"
                                           class="d-none" accept="image/*"/>
                                </div>

                                <!-- Full name -->
                                <div class="col-md-6 mb-3">
                                    <div class="form-floating">
                                        <input type="text" id="fullName" th:field="*{fullName}"
                                               class="form-control" placeholder="Họ và tên" required/>
                                        <label for="fullName" th:text="#{full_name}">Họ và tên</label>
                                    </div>
                                </div>

                                <!-- Email (readonly) -->
                                <div class="col-md-6 mb-3">
                                    <div class="form-floating">
                                        <input type="email" id="email" th:value="${#authentication.name}"
                                               class="form-control" placeholder="Email" readonly/>
                                        <label for="email" th:text="#{email}">Email</label>
                                    </div>
                                </div>

                                <!-- Date of birth -->
                                <div class="col-md-6 mb-3">
                                    <div class="form-floating">
                                        <input type="text" id="dob" name="dob"
                                               th:value="${#temporals.format(user.dob, 'dd/MM/yyyy')}"
                                               class="form-control" placeholder="dd/MM/yyyy"
                                               pattern="\d{2}/\d{2}/\d{4}" required/>
                                        <label for="dob" th:text="#{dob}">Ngày sinh</label>
                                    </div>
                                </div>

                                <!-- Gender -->
                                <div class="col-md-6 mb-3">
                                    <div class="form-floating">
                                        <select id="gender" th:field="*{gender}"
                                                class="form-select" placeholder="Giới tính" required>
                                            <option value="Male" th:text="#{male}">Nam</option>
                                            <option value="Female" th:text="#{female}">Nữ</option>
                                            <option value="Other">Khác</option>
                                        </select>
                                        <label for="gender" th:text="#{gender}">Giới tính</label>
                                    </div>
                                </div>

                                <!-- Phone -->
                                <div class="col-md-6 mb-3">
                                    <div class="form-floating">
                                        <input type="text" id="phone" th:field="*{phone}"
                                               class="form-control" th:attr="placeholder=${phone_number}"
                                               pattern="[0-9]{10}" required/>
                                        <label for="phone" th:text="#{phone_number}"> Số điện thoại</label>
                                    </div>
                                </div>

                                <!-- CCCD -->
                                <div class="col-md-6 mb-3">
                                    <div class="form-floating">
                                        <input type="text" id="citizenIdentification"
                                               th:field="*{citizenIdentification}"
                                               class="form-control" placeholder="CCCD"
                                               pattern="[0-9]{12}" required/>
                                        <label for="citizenIdentification" th:text="#{id_card}">CCCD</label>
                                    </div>
                                </div>

                                <!-- Address -->
                                <div class="col-12 mb-3">
                                    <div class="form-floating">
                                        <input type="text" id="address" th:field="*{address}"
                                               class="form-control" placeholder="Địa chỉ" required/>
                                        <label for="address" th:text="#{address_cus}">Địa chỉ</label>
                                    </div>
                                </div>

                                <!-- Nationality -->
                                <div class="col-md-6 mb-3">
                                    <div class="form-floating">
                                        <input type="text" id="nationality" th:field="*{nationality}"
                                               class="form-control" placeholder="Quốc tịch" required/>
                                        <label for="nationality" th:text="#{nationality}">Quốc tịch</label>
                                    </div>
                                </div>

                                <!-- Ranking (readonly) -->
                                <div class="col-md-6 mb-3">
                                    <div class="form-floating">
                                        <input type="text" id="ranking" th:field="*{ranking}"
                                               class="form-control" placeholder="Xếp hạng" readonly/>
                                        <label for="ranking" th:text="#{ranking}">Xếp hạng</label>
                                    </div>
                                </div>

                            </div>

                            <!-- Buttons -->
                            <div class="d-flex justify-content-end mt-4">
                                <a href="/profile" class="btn btn-outline-secondary me-2" th:text="#{cancel}">Hủy</a>
                                <button type="submit" class="btn btn-custom" th:text="#{save}">Lưu thay đổi</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div><!-- .mypage_block END -->
    </section>
    <th:block th:replace="~{user/layouts/footer::footer}"></th:block>
</main>
<th:block th:replace="~{user/layouts/script::script}"></th:block>
</body>
</html>
