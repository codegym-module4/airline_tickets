<!DOCTYPE html>
<html lang="en">
<head th:replace="~{user/layouts/head::head (#{payment_success})}"></head>
<body>
<th:block th:replace="~{user/layouts/header::header}"></th:block>
<main id="content">
  <section class="section">
    <div class="">
      <div class="card shadow p-4 text-center">
        <i class="fa-solid fa-circle-check text-success display-3 mb-3"></i>
        <h2 class="text-success fw-bold" th:text="#{payment_success}">Thanh toán thành công!</h2>
        <p class="mt-3" th:text="#{booking_success}">
          Bạn đã hoàn thành đặt vé. Vui lòng kiểm tra lịch sử thanh toán.
          Cảm ơn bạn đã tin tưởng và sử dụng dịch vụ của chúng tôi.
        </p>

        <!-- Nút hành động -->
        <div class="row justify-content-center mt-5">
          <div class="col-md-4">
            <a href="/payment/transfer-history" class="btn btn-outline-primary w-100 py-2 mb-2" th:text="#{transaction_history}">
              <i class="fa-solid fa-file-invoice me-2"></i> Lịch sử giao dịch
            </a>
          </div>
          <div class="col-md-4">
            <a href="/payment" class="btn btn-danger w-100 py-2" th:text="#{back_to_payment_page}">
              <i class="fa-solid fa-house me-2"></i> Quay về trang thanh toán
            </a>
          </div>
        </div>
      </div>
    </div><!-- .mypage_block END -->
  </section>
</main>
<th:block th:replace="~{user/layouts/footer::footer}"></th:block>
<th:block th:replace="~{user/layouts/script::script}"></th:block>
</body>
</html>
