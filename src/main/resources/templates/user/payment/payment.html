<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/html">
<head th:replace="~{user/layouts/head::head(#{payment})}"></head>
<body>
<!--Header-->
<th:block th:replace="~{user/layouts/header::header}"></th:block>
<main id="content">
    <section class="section">
        <div class="mypage_block user_payment">
            <nav class="mypage_nav">
                <ul>
                    <li class="user_info"><a href="/profile" th:text="#{user_infor}">Thông tin cá nhân</a></li>
                    <li class="user_ticket"><a href="/my-ticket" th:text="#{my_ticket}">Đặt chỗ của tôi</a></li>
                    <li class="user_payment"><a href="/payment" th:text="#{payment}">Thanh toán</a></li>
                    <li class="user_transfer_history"><a href="/payment/transfer-history"
                                                         th:text="#{transaction_history}">Lịch sử giao dịch</a></li>
                    <li class="user_change_password"><a href="/profile/change-password" th:text="#{change_password}">Đổi
                        mật khẩu</a></li>
                </ul>
            </nav>
            <section class="mypage_content">
                <div class="table_scroll w-100">
                    <table class="table_style text-nowrap">
                        <tbody>
                        <tr>
                            <th th:text="#{booking_code}">Mã vé</th>
                            <th th:text="#{departure_city}">Nơi đi</th>
                            <th th:text="#{arrival_city}">Nơi đến</th>
                            <th th:text="#{date}">Ngày đặt</th>
                            <th th:text="#{departure_date}">Ngày bay</th>
                            <th th:text="#{price}">Giá</th>
                            <th th:text="#{cancel}">Hủy</th>
                            <th th:text="#{choose}">Chọn</th>
                        </tr>
                        <tr class="text-center" th:if="${list.isEmpty()}">
                            <td colspan="8" th:text="#{no_data}">Không tìm thấy dữ liệu</td>
                        </tr>
                        <tr th:each="booking : ${list}">
                            <td th:text="${booking.code}"></td>
                            <td th:text="${booking.flight.departureAirport.city}"></td>
                            <td th:text="${booking.returnFlight != null ? booking.returnFlight.departureAirport.city : 'Không'}"></td>
                            <td th:text="${#temporals.format(booking.createdAt, 'dd/MM/yyyy')}">15/05/2025</td>
                            <td th:text="${#temporals.format(booking.flight.departure_time, 'dd/MM/yyyy')}">25/05/2025
                            </td>
                            <td class="price-txt" th:id="'price_' + ${booking.id}" th:text="${booking.totalPrice}"></td>
                            <td>
                                <a th:href="@{'/payment/cancel/' + ${booking.id}}"
                                   th:onclick="'return confirm(\'' + #{confirm.cancel} + '\')'"
                                   th:data-id="${booking.id}" th:text="#{cancel}">Hủy</a>
                            </td>
                            <td class="text-center">
                                <input type="checkbox" class="form-check-input border border-secondary payment-checkbox"
                                       value="1" th:data-id="${booking.id}" name="radio_chosen"/>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="pt-3 d-flex justify-content-end">
                    <div class="text-right">
                        <button type="button" class="btn btn-sm btn-custom px-3" id="btnPayment" th:text="#{payment}">
                            Thanh toán
                        </button>
                    </div>
                </div>
            </section>
        </div><!-- .mypage_block END -->
    </section>
</main>
<th:block th:insert="~{user/layouts/modal_success::modalSuccess}"></th:block>
<th:block th:replace="~{user/layouts/footer::footer}"></th:block>
<th:block th:replace="~{user/layouts/script::script}"></th:block>
</body>

</html>
