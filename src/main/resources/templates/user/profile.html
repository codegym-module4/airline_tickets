<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{user/layouts/head::head('Hồ sơ - Vietjet Air')}"></head>
<body style="background: url('/user/img/background-main.jpg'); background-size: cover;">
    <th:block th:replace="~{user/layouts/header::header}"></th:block>
    <main id="content">
        <section class="section">
            <div class="mypage_block user_info">
                <nav class="mypage_nav">
                    <ul>
                        <li class="user_info"><a href="#">Thông tin cá nhân</a></li>
                        <li class="user_payment"><a href="/payment">Thanh toán</a></li>
                        <li class="user_transfer_history"><a href="/payment/transfer-history">Lịch sử giao dịch</a></li>
                        <li class="user_change_password"><a th:href="@{/profile/change-password}">Đổi mật khẩu</a></li>
                    </ul>
                </nav>
                <section class="mypage_content">
                    <div class="booking-form" style="max-width: 400px; padding: 20px; border-radius: 5px;">
                        <h2 class="text-white text-center">Hồ sơ người dùng</h2>
                        <div sec:authorize="isAuthenticated()">
                            <div class="mt-3">
                                <p class="text-white"><strong>Email:</strong> <span sec:authentication="name"></span></p>
                                <p class="text-white"><strong>Họ và tên:</strong> <span sec:authentication="principal.fullName"></span></p>
                                <p class="text-white"><strong>Mã khách hàng:</strong> <span th:text="${user.code}"></span></p>
                                <p class="text-white"><strong>Số điện thoại:</strong> <span th:text="${user.phone}"></span></p>
                                <p class="text-white"><strong>Địa chỉ:</strong> <span th:text="${user.address}"></span></p>
                                <a th:href="@{/profile/edit}" class="btn btn-custom w-100 mb-2">Chỉnh sửa</a>
                            </div>
                        </div>
                    </div>
                </section>
            </div><!-- .mypage_block END -->
        </section>
        <th:block th:replace="~{user/layouts/footer::footer}"></th:block>
    </main>
    <th:block th:replace="~{user/layouts/script::script}"></th:block>
</body>
</html>
