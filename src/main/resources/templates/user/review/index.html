<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/html">
<head th:replace="~{user/layouts/head::head ('Đánh giá chuyến bay')}"></head>
<body class="bg-light">
<th:block th:replace="~{user/layouts/header::header}"></th:block>
<div class="main-content py-5">
    <div class="container border py-4">
        <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="card-title text-center mb-4">Đánh giá chất lượng chuyến bay</h4>
                    <input type="hidden" name="bookId" th:value="${booking.id}" />
                    <div class="text-center mb-2">
                        <div class="star-container" id="starContainer">
                            <div class="star-base">★★★★★</div>
                            <div class="star-filled" id="starFilled">★★★★★</div>
                        </div>
                    </div>
                    <p class="text-center text-muted mb-3" id="ratingText">Chưa đánh giá</p>
                    <div class="mb-3">
                        <label for="feedback" class="form-label">Nội dung đánh giá</label>
                        <textarea class="form-control" id="feedback" rows="4" placeholder="Chia sẻ cảm nhận của bạn..."></textarea>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-detail" id="submitBtn">Gửi đánh giá</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</div>
<th:block th:replace="~{user/layouts/footer::footer}"></th:block>
<th:block th:replace="~{user/layouts/script::script}"></th:block>
<script>
    $(function () {
        const $container = $('#starContainer');
        const $filled = $('#starFilled');
        const $text = $('#ratingText');
        const bookId = $("input[name='bookId']").val();
        let rating = 0;
        let hoverRating = 0;

        function updateStarDisplay(value) {
            const percent = (value / 5) * 100;
            $filled.css('width', percent + '%');
        }

        // Hover handler
        $container.on('mousemove', function (e) {
            const offset = $(this).offset();
            const width = $(this).width();
            const posX = e.pageX - offset.left;
            const raw = (posX / width) * 5;
            hoverRating = Math.round(raw * 10) / 10;
            hoverRating = Math.min(5, Math.max(0, hoverRating));
            updateStarDisplay(hoverRating);
        });

        // Click = chọn chính thức
        $container.on('click', function () {
            rating = hoverRating;
            updateStarDisplay(rating);
            $text.text(`Đang chọn: ${rating.toFixed(1)} sao`);
        });

        // Rời chuột → trở lại rating đã chọn
        $container.on('mouseleave', function () {
            updateStarDisplay(rating);
        });

        $('#submitBtn').on('click', function () {
            const feedback = $('#feedback').val().trim();
            if (rating === 0) {
                alert('Vui lòng click chọn số sao.');
                return;
            }
            if (!feedback) {
                alert('Vui lòng nhập nội dung đánh giá.');
                return;
            }

            $.ajax({
                method: "POST",
                url: "/api/review",
                data: {
                    booking : bookId,
                    content : feedback,
                    rating : rating
                },
                dataType: 'json'
            }).done(function (data) {
                if (data.url) {
                    window.location.href = data.url
                }
            }).fail(function (jqXhr, json, errorThrown) {
                if (jqXhr.responseJSON.errors) {
                    alert(jqXhr.responseJSON.message);
                }
            });
        });
    });
</script>
</body>
</html>
