<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{user/layouts/head::head('Chỉnh sửa hồ sơ - Vietjet Air')}"></head>
<body style="background: url('/user/img/background-main.jpg'); background-size: cover;">
<th:block th:replace="~{user/layouts/header::header}"></th:block>
<main id="content">
    <section class="section">
        <div class="mypage_block user_change_password">
            <nav class="mypage_nav">
                <ul>
                    <li class="user_info"><a href="/profile">Thông tin cá nhân</a></li>
                    <li class="user_payment"><a href="/payment">Thanh toán</a></li>
                    <li class="user_transfer_history"><a href="/payment/transfer-history">Lịch sử giao dịch</a></li>
                    <li class="user_change_password"><a href="#">Đổi mật khẩu</a></li>
                </ul>
            </nav>
            <section class="mypage_content">
                <div class="booking-form" style="max-width: 400px; padding: 20px; border-radius: 5px;">
                    <h2 class="text-white text-center">Chỉnh sửa hồ sơ</h2>
                    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                    <form th:action="@{/profile/edit}" th:object="${user}" method="post" class="mt-3">
                        <div class="mb-3">
                            <label for="fullName" class="form-label text-white">Họ và tên:</label>
                            <input type="text" id="fullName" th:field="*{fullName}" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label text-white">Số điện thoại:</label>
                            <input type="text" id="phone" th:field="*{phone}" class="form-control" required pattern="[0-9]{10}"/>
                        </div>
                        <div class="mb-3">
                            <label for="address" class="form-label text-white">Địa chỉ:</label>
                            <input type="text" id="address" th:field="*{address}" class="form-control" required/>
                        </div>
                        <button type="submit" class="btn btn-custom w-100">Lưu</button>
                    </form>
                </div>
            </section>
        </div><!-- .mypage_block END -->
    </section>
    <th:block th:replace="~{user/layouts/footer::footer}"></th:block>
</main>
<th:block th:replace="~{user/layouts/script::script}"></th:block>
</body>
</html>
