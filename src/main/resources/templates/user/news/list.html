<!DOCTYPE html>
<html lang="vi">
<head th:replace="~{user/layouts/head::head ('Vietjet Air | Bay là thích ngay | Website chính thức')}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        news {
            background-image: url('/static/user/img/background.jpg');
            background-size: cover;
        }
    </style>
</head>
<body>

<!-- Main Content (Homepage) -->
<main class="py-0">
    <!--Header-->
    <th:block th:replace="~{user/layouts/header::header}"></th:block>

    <div class="news">
        <div class="news-list container" style="background-color: white">
            <h1 class=" mb-4" style=" font-weight: bold;">Tin tức mới nhất</h1>

            <!-- Lặp qua danh sách tin tức -->
            <div th:each="news : ${newsList}" class="card mb-4">
                <div class="row g-0 align-items-stretch">
                    <!-- Ảnh bên trái -->
                    <div class="col-md-4">
                        <img th:src="${news.imageURL}" class="img-fluid rounded-start"
                             alt="News image"
                             style="height: 200px; width: 100%; object-fit: cover;">
                    </div>

                    <!-- Nội dung bên phải sử dụng CSS Grid -->
                    <div class="col-md-8">
                        <div class="card-body h-100 d-grid" style="grid-template-rows: auto 1fr auto;">
                            <!-- Phần 1: Tiêu đề -->
                            <h4 class="card-title mb-2" th:text="${news.title}" style="color: red; font-weight: bold;">
                                Title</h4>
                            <p class="card-text mb-2 text-muted" style="font-size: 0.9rem;">
                                <i class="bi bi-clock"></i>
                                <span th:text="${#temporals.format(news.createdAt, 'dd/MM/yyyy')}"></span>
                            </p>

                            <!-- Phần 2: Nội dung tóm tắt -->
                            <p class="card-text mb-3" th:text="${#strings.abbreviate(news.content, 300)}">Short
                                content</p>

                            <!-- Phần 3: Nút Xem thêm -->
                            <div class="text-end">
                                <a th:href="@{/news/detail/{id}(id=${news.id})}" class="btn btn-primary">Xem thêm</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <th:block th:insert="~{user/layouts/modal_success::modalSuccess}"></th:block>
    <th:block th:insert="~{user/layouts/modal_error::modalError}"></th:block>
    <th:block th:replace="~{user/layouts/footer::footer}"></th:block>
</main>
<th:block th:replace="~{user/layouts/script::script}"></th:block>

<script src="/user/js/homepage.js"></script>
</body>
</html>
