<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{user/layouts/head::head('Đăng nhập - Vietjet Air')}"></head>
<body class="auth-page">
<main>
    <th:block th:replace="~{user/layouts/header::header}"></th:block>
    <div class="auth-container">
        <h2>Đăng nhập</h2>
        <div th:if="${param.error}" class="alert alert-danger">Email hoặc mật khẩu không đúng!</div>
        <div th:if="${param.logout}" class="alert alert-success">Bạn đã đăng xuất thành công!</div>
        <div th:if="${param.register_success}" class="alert alert-success">Đăng ký thành công! Vui lòng đăng nhập.</div>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Email:</label>
                <input type="text" id="username" name="username" class="form-control" required/>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Mật khẩu:</label>
                <input type="password" id="password" name="password" class="form-control" required/>
            </div>
            <button type="submit" class="btn-custom">Đăng nhập</button>
            <p class="mt-3 text-center">
                <a th:href="@{/register}">Đăng ký</a> |
                <a th:href="@{/forgot-password}">Quên mật khẩu?</a>
            </p>
        </form>
    </div>
    <th:block th:replace="~{user/layouts/footer::footer}"></th:block>
</main>
<th:block th:replace="~{user/layouts/script::script}"></th:block>
</body>
</html>
