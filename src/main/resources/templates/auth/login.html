<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{user/layouts/head::head('Đăng nhập - Vietjet Air')}"></head>
<body style="background: url('/user/img/background-main.jpg'); background-size: cover;">
<main class="py-0">
    <th:block th:replace="~{user/layouts/header::header}"></th:block>
    <div class="container mt-5 d-flex justify-content-center">
        <div class="booking-form" style="max-width: 400px; padding: 20px; border-radius: 5px;">
            <h2 class="text-white text-center">Đăng nhập</h2>
            <div th:if="${param.error}" class="alert alert-danger">Email hoặc mật khẩu không đúng!</div>
            <div th:if="${param.logout}" class="alert alert-success">Bạn đã đăng xuất thành công!</div>
            <div th:if="${param.register_success}" class="alert alert-success">Đăng ký thành công! Vui lòng đăng nhập.</div>
            <form th:action="@{/login}" method="post" class="mt-3">
                <div class="mb-3">
                    <label for="username" class="form-label text-white">Email:</label>
                    <input type="text" id="username" name="username" class="form-control" required/>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label text-white">Mật khẩu:</label>
                    <input type="password" id="password" name="password" class="form-control" required/>
                </div>
                <button type="submit" class="btn btn-custom w-100">Đăng nhập</button>
                <p class="mt-2 text-center text-white">
                    <a th:href="@{/register}" class="text-white">Đăng ký</a> |
                    <a th:href="@{/forgot-password}" class="text-white">Quên mật khẩu?</a>
                </p>
            </form>
        </div>
    </div>
    <th:block th:replace="~{user/layouts/footer::footer}"></th:block>
</main>
<th:block th:replace="~{user/layouts/script::script}"></th:block>
</body>
</html>
