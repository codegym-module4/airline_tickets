<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{user/layouts/head::head('Đặt lại mật khẩu - Vietjet Air')}"></head>
<body class="auth-page">
<main>
    <th:block th:replace="~{user/layouts/header::header}"></th:block>
    <div class="auth-container">
        <h2 th:text="#{change_password}">Đặt lại mật khẩu</h2>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" name="email" th:value="${email}"/>
            <div class="mb-3">
                <label for="code" class="form-label" th:text="#{otp}">Mã xác nhận:</label>
                <input type="text" id="code" name="code" class="form-control" required/>
            </div>
            <div class="mb-3">
                <label for="newPassword" class="form-label" th:text="#{new_password}">Mật khẩu mới:</label>
                <input type="password" id="newPassword" name="newPassword" class="form-control" required minlength="6"/>
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label text-white" th:text="#{confirm_password}">Xác nhận mật khẩu mới:</label>
                <input type="password" id="confirmPassword" class="form-control" required minlength="6"/>
            </div>
            <button type="submit" class="btn-custom" th:text="#{confirm}">Xác nhận</button>
        </form>
    </div>
    <th:block th:replace="~{user/layouts/footer::footer}"></th:block>
</main>
<th:block th:replace="~{user/layouts/script::script}"></th:block>

<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        if (document.getElementById('newPassword').value
            !== document.getElementById('confirmPassword').value) {
            e.preventDefault();
            alert('Mật khẩu mới và xác nhận mật khẩu không khớp!');
        }
    });
</script>

</body>
</html>
