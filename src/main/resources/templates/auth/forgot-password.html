<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{user/layouts/head::head('Quên mật khẩu - Vietjet Air')}"></head>
<body style="background: url('/user/img/background-main.jpg'); background-size: cover;">
<main class="py-0">
    <th:block th:replace="~{user/layouts/header::header}"></th:block>
    <div class="container mt-5 d-flex justify-content-center">
        <div class="booking-form" style="max-width: 400px; padding: 20px; border-radius: 5px;">
            <h2 class="text-white text-center">Quên mật khẩu</h2>
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <form th:action="@{/forgot-password}" method="post" class="mt-3">
                <div class="mb-3">
                    <label for="email" class="form-label text-white">Email:</label>
                    <input type="email" id="email" name="email" class="form-control" required/>
                </div>
                <button type="submit" class="btn btn-custom w-100">Gửi mã xác nhận</button>
            </form>
        </div>
    </div>
    <th:block th:replace="~{user/layouts/footer::footer}"></th:block>
</main>
<th:block th:replace="~{user/layouts/script::script}"></th:block>
</body>
</html>
